version: '3.8'

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G
    command: ['start.sh', 'immich']
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_URL: postgresql://${IMMICH_DB_USER:-immich}:${IMMICH_DB_PASSWORD}@database:5432/${IMMICH_DB_NAME:-immich}
      REDIS_HOSTNAME: redis
    networks:
      - immich-network
    depends_on:
      - redis
      - database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  immich-microservices:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    deploy:
      replicas: 1
    command: ['start.sh', 'microservices']
    volumes:
      - model-cache:/cache
    environment:
      DB_URL: postgresql://${IMMICH_DB_USER:-immich}:${IMMICH_DB_PASSWORD}@database:5432/${IMMICH_DB_NAME:-immich}
      REDIS_HOSTNAME: redis
    networks:
      - immich-network
    depends_on:
      - redis
      - database

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    deploy:
      replicas: 1
    volumes:
      - model-cache:/cache
    environment:
      DB_URL: postgresql://${IMMICH_DB_USER:-immich}:${IMMICH_DB_PASSWORD}@database:5432/${IMMICH_DB_NAME:-immich}
      REDIS_HOSTNAME: redis
    networks:
      - immich-network
    restart: unless-stopped

  redis:
    image: docker.io/valkey/valkey:9-alpine
    deploy:
      replicas: 1
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - immich-network
    restart: unless-stopped

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    deploy:
      replicas: 1
    command: postgres -c shared_preload_libraries=vectors.so -c 'search_path="immichpg, public"'
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USER:-immich}
      POSTGRES_DB: ${IMMICH_DB_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data
    networks:
      - immich-network
    restart: unless-stopped

volumes:
  model-cache:

networks:
  immich-network:
    driver: overlay
    attachable: true
