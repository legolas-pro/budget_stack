version: "3.8"

# ============================================================================
# STACK: Actual Snapshot Sync -> SQLite View-Only
# VERSAO: 2.0
# VPS: fin-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# OBJETIVO:
#   - Ler o snapshot SQLite mais recente do volume do Actual
#   - Gerar um SQLite espelho estavel para consumo do Metabase
#
# DEPLOY:
#   docker stack deploy -c actual-sync.yaml actual-sync --env-file actual-sync.env
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versoes aqui)
# ============================================================================
x-images:
  worker: &worker_image ${ACTUAL_SYNC_IMAGE:-actual-sync:local}

services:
  # ==========================================================================
  # WORKER - Snapshot SQLite -> SQLite View-Only
  # ==========================================================================
  worker:
    image: *worker_image
    networks:
      - actual_sync_internal

    environment:
      - ACTUAL_DATA_DIR=/actual-data
      - OUTPUT_DIR=/bi-data
      - OUTPUT_FILENAME=${ACTUAL_BI_DB_FILE:-actual_bi.sqlite}
      - METADATA_FILENAME=${ACTUAL_BI_METADATA_FILE:-actual_bi.metadata.json}
      - SOURCE_DB_FILENAME=${ACTUAL_SOURCE_DB_FILENAME:-}
      - SYNC_INTERVAL_SECONDS=${ACTUAL_SYNC_INTERVAL_SECONDS:-180}
      - SKIP_UNCHANGED_SNAPSHOT=${ACTUAL_SYNC_SKIP_UNCHANGED:-true}
      - FORCE_COPY_EVERY_CYCLE=${ACTUAL_SYNC_FORCE_COPY:-false}
      - SET_OUTPUT_READONLY=${ACTUAL_SYNC_SET_OUTPUT_READONLY:-true}
      - SNAPSHOT_EXTENSIONS=${ACTUAL_SNAPSHOT_EXTENSIONS:-.sqlite,.sqlite3,.db}
      - RUN_ONCE=${ACTUAL_SYNC_RUN_ONCE:-false}
      - LOG_LEVEL=${ACTUAL_SYNC_LOG_LEVEL:-INFO}
      - TZ=${TZ:-America/Sao_Paulo}

    volumes:
      - actual_source_data:/actual-data:ro
      - actual_bi_data:/bi-data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/actual_sync_last_success"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  # Volume externo criado pela stack do Actual (ex.: actual_actual_data)
  actual_source_data:
    external: true
    name: ${ACTUAL_VOLUME_NAME:-actual_actual_data}

  # Volume com o SQLite estavel para BI (montar no Metabase como read-only)
  actual_bi_data:
    name: ${ACTUAL_BI_VOLUME_NAME:-actual_bi_data}

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  actual_sync_internal:
    driver: overlay
    internal: true
