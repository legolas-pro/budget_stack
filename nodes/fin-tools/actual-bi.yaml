version: "3.7"

# ============================================================================
# STACK: Actual BI (Actual HTTP API -> PostgreSQL)
# VERSAO: 1.0
# VPS: fin-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# SERVICOS ATIVOS:
#   - actual_bi_postgres -> Banco relacional para BI / consultas diretas
#   - actual_bi_sync     -> Worker de ingestao e upsert idempotente
#
# DEPLOY:
#   docker stack deploy -c actual-bi.yaml actual-bi --env-file actual-bi.env
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versoes aqui)
# ============================================================================
x-images:
  postgres: &postgres_image ${ACTUAL_BI_POSTGRES_IMAGE:-postgres:16-alpine}
  sync: &sync_image ${ACTUAL_BI_SYNC_IMAGE:-actual-bi-sync:local}

services:
  # ==========================================================================
  # POSTGRESQL - Banco para BI
  # ==========================================================================
  actual_bi_postgres:
    image: *postgres_image
    networks:
      - actual_bi_internal

    ports:
      - "${ACTUAL_BI_POSTGRES_PORT:-55432}:5432"

    environment:
      - POSTGRES_DB=${ACTUAL_BI_DB_NAME:-actual_bi}
      - POSTGRES_USER=${ACTUAL_BI_DB_USER:-actual_bi}
      - POSTGRES_PASSWORD=${ACTUAL_BI_DB_PASSWORD}
      - TZ=${TZ:-America/Sao_Paulo}

    volumes:
      - actual_bi_postgres_data:/var/lib/postgresql/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACTUAL_BI_DB_USER:-actual_bi} -d ${ACTUAL_BI_DB_NAME:-actual_bi}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # WORKER - Sync Actual API para PostgreSQL
  # ==========================================================================
  actual_bi_sync:
    image: *sync_image
    networks:
      - actual_bi_internal

    environment:
      # Origem: actual-http-api
      - ACTUAL_HTTP_API_BASE_URL=${ACTUAL_HTTP_API_BASE_URL:-http://172.17.0.1:5007/v1}
      - ACTUAL_HTTP_API_KEY=${ACTUAL_HTTP_API_KEY}
      - ACTUAL_HTTP_TIMEOUT_SECONDS=${ACTUAL_HTTP_TIMEOUT_SECONDS:-30}
      - ACTUAL_HTTP_VERIFY_SSL=${ACTUAL_HTTP_VERIFY_SSL:-true}
      - ACTUAL_HTTP_RETRIES=${ACTUAL_HTTP_RETRIES:-3}
      - ACTUAL_HTTP_BACKOFF_SECONDS=${ACTUAL_HTTP_BACKOFF_SECONDS:-2}

      # Escopo de ingestao
      - ACTUAL_BI_ENDPOINTS=${ACTUAL_BI_ENDPOINTS:-accounts,transactions,payees,categories}
      - ACTUAL_BI_BUDGET_IDS=${ACTUAL_BI_BUDGET_IDS:-}
      - ACTUAL_BI_REQUIRE_NON_EMPTY_BUDGETS=${ACTUAL_BI_REQUIRE_NON_EMPTY_BUDGETS:-true}
      - ACTUAL_BI_FAIL_ON_ENDPOINT_ERROR=${ACTUAL_BI_FAIL_ON_ENDPOINT_ERROR:-true}

      # Destino: PostgreSQL
      - DB_HOST=actual_bi_postgres
      - DB_PORT=5432
      - DB_NAME=${ACTUAL_BI_DB_NAME:-actual_bi}
      - DB_USER=${ACTUAL_BI_DB_USER:-actual_bi}
      - DB_PASSWORD=${ACTUAL_BI_DB_PASSWORD}
      - DB_SSLMODE=${ACTUAL_BI_DB_SSLMODE:-disable}
      - DB_CONNECT_TIMEOUT_SECONDS=${ACTUAL_BI_DB_CONNECT_TIMEOUT_SECONDS:-10}

      # Usuario read-only para conexao direta (opcional)
      - READONLY_DB_USER=${ACTUAL_BI_READONLY_DB_USER:-}
      - READONLY_DB_PASSWORD=${ACTUAL_BI_READONLY_DB_PASSWORD:-}

      # Worker
      - SYNC_INTERVAL_SECONDS=${ACTUAL_BI_SYNC_INTERVAL_SECONDS:-300}
      - RUN_ONCE=${ACTUAL_BI_SYNC_RUN_ONCE:-false}
      - LOG_LEVEL=${ACTUAL_BI_SYNC_LOG_LEVEL:-INFO}
      - HEALTH_SUCCESS_FILE=/tmp/actual_bi_sync_last_success
      - HEALTH_ERROR_FILE=/tmp/actual_bi_sync_last_error
      - TZ=${TZ:-America/Sao_Paulo}

    depends_on:
      - actual_bi_postgres

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/actual_bi_sync_last_success"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  actual_bi_postgres_data:
    name: ${ACTUAL_BI_POSTGRES_DATA_VOLUME_NAME:-actual_bi_postgres_data}

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  actual_bi_internal:
    driver: overlay
    internal: true
