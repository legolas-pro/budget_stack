version: "3.7"

# ============================================================================
# STACK: Actual Budget - Orçamento Pessoal
# VERSÃO: 1.3
# VPS: fin-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# SERVIÇOS ATIVOS:
#   - app         → Actual Budget UI (Node.js/SQLite)       host: ${ACTUAL_PORT:-5006}
#   - api         → REST API (jhonderson/actual-http-api)   host: ${ACTUAL_API_PORT:-5007}
#   - actual_mcp  → MCP via supergateway (streamableHttp)   host: ${ACTUAL_MCP_PORT:-3001}
#   - actual_sync → SQLite espelho view-only para BI         volume: ${ACTUAL_BI_VOLUME_NAME:-actual_bi_data}
#
# DEPLOY:
#   docker stack deploy -c actual.yaml actual --env-file actual.env
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  actual: &actual_image actualbudget/actual-server:latest
  actual_mcp: &actual_mcp_image ${ACTUAL_MCP_IMAGE:-actual-mcp:local}
  actual_http_api: &actual_http_api_image jhonderson/actual-http-api:latest
  actual_sync: &actual_sync_image ${ACTUAL_SYNC_IMAGE:-actual-sync:local}

services:
  # ==========================================================================
  # ACTUAL BUDGET - Orçamento Pessoal (Local-First)
  # ==========================================================================
  app:
    image: *actual_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_PORT:-5006}:5006"

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - actual_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "node", "src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
      
  api:
    image: *actual_http_api_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_API_PORT:-5007}:5007"

    environment:
      - ACTUAL_SERVER_URL=http://app:5006
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_PASSWORD}
      - API_KEY=${ACTUAL_API_KEY}
      - TZ=America/Sao_Paulo

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      disable: true

  # ==========================================================================
  # ACTUAL MCP - Integração Model Context Protocol
  # ==========================================================================
  actual_mcp:
    image: *actual_mcp_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_MCP_PORT:-3001}:3001"

    environment:
      # URL interna do Actual Budget — ajuste se mudar porta ou nome do serviço
      - ACTUAL_SERVER_URL=${ACTUAL_MCP_SERVER_URL:-http://app:5006}
      # Senha do servidor Actual (mesma usada no app)
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}
      # Opcional: senha de criptografia se diferente da senha do servidor
      - ACTUAL_BUDGET_ENCRYPTION_PASSWORD=${ACTUAL_BUDGET_ENCRYPTION_PASSWORD:-}
      - TZ=America/Sao_Paulo

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ==========================================================================
  # ACTUAL SYNC - Gera SQLite view-only para BI (Metabase)
  # ==========================================================================
  actual_sync:
    image: *actual_sync_image
    networks:
      - actual_internal

    environment:
      - ACTUAL_DATA_DIR=/actual-data
      - OUTPUT_DIR=/bi-data
      - OUTPUT_FILENAME=${ACTUAL_BI_DB_FILE:-actual_bi.sqlite}
      - METADATA_FILENAME=${ACTUAL_BI_METADATA_FILE:-actual_bi.metadata.json}
      - SOURCE_DB_FILENAME=${ACTUAL_SOURCE_DB_FILENAME:-}
      - SYNC_INTERVAL_SECONDS=${ACTUAL_SYNC_INTERVAL_SECONDS:-180}
      - SKIP_UNCHANGED_SNAPSHOT=${ACTUAL_SYNC_SKIP_UNCHANGED:-true}
      - FORCE_COPY_EVERY_CYCLE=${ACTUAL_SYNC_FORCE_COPY:-false}
      - SET_OUTPUT_READONLY=${ACTUAL_SYNC_SET_OUTPUT_READONLY:-true}
      - SNAPSHOT_EXTENSIONS=${ACTUAL_SNAPSHOT_EXTENSIONS:-.sqlite,.sqlite3,.db}
      - RUN_ONCE=${ACTUAL_SYNC_RUN_ONCE:-false}
      - LOG_LEVEL=${ACTUAL_SYNC_LOG_LEVEL:-INFO}
      - TZ=America/Sao_Paulo

    volumes:
      - actual_data:/actual-data:ro
      - actual_bi_data:/bi-data

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/actual_sync_last_success"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  actual_data:
    driver: local
  actual_bi_data:
    name: ${ACTUAL_BI_VOLUME_NAME:-actual_bi_data}

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  actual_internal:
    driver: overlay
    internal: true
