# ============================================================================
# LibreChat — Arquivo de Configuração Principal
# Referência: https://www.librechat.ai/docs/configuration/librechat_yaml
# ============================================================================
# Este arquivo é injetado no container via Docker Swarm Config.
# Para atualizar após o deploy:
#   1. Edite este arquivo
#   2. docker config rm librechat_librechat_config
#   3. docker stack deploy -c librechat-stack.yaml librechat --env-file librechat-stack.env
# ============================================================================
version: 1.1.6
cache: true

# ============================================================================
# SERVIDORES MCP (Model Context Protocol)
# Cada entrada é um servidor de ferramentas acessível pelo assistente.
# LibreChat conecta via SSE aos servidores providos por supergateway e swagger_mcp.
# ============================================================================
mcpServers:

  # --------------------------------------------------------------------------
  # supergateway — Ferramentas MCP gerais (filesystem, fetch, memory, etc.)
  # Endpoint SSE exposto pelo serviço "supergateway" na rede mcp_internal.
  # Troque o servidor MCP em SUPERGATEWAY_MCP_COMMAND no env file.
  # --------------------------------------------------------------------------
  supergateway:
    type: sse
    url: "http://supergateway:8080/sse"
    timeout: 60000
    initTimeout: 15000

  # --------------------------------------------------------------------------
  # swagger-mcp — Endpoints de APIs REST como ferramentas MCP
  # Lê a spec OpenAPI configurada em SWAGGER_MCP_SPEC_URL e converte
  # cada endpoint em uma ferramenta MCP utilizável pelo assistente.
  # --------------------------------------------------------------------------
  swagger-mcp:
    type: sse
    url: "http://swagger_mcp:8081/sse"
    timeout: 60000
    initTimeout: 15000

# ============================================================================
# ENDPOINTS DE IA (configurações globais)
# As chaves de API são lidas das variáveis de ambiente definidas no env file.
# ============================================================================
endpoints:
  # Configurações do endpoint OpenAI
  openAI:
