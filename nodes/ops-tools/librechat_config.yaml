# ============================================================================
# LibreChat — Arquivo de Configuração Principal
# Referência: https://www.librechat.ai/docs/configuration/librechat_yaml
# ============================================================================
# Este arquivo é injetado no container via Docker Swarm Config.
# Para atualizar após o deploy:
#   1. Edite este arquivo
#   2. Portainer → Configs → remova librechat_config → Add config com novo conteúdo
#   3. Portainer → Stacks → Update the stack
# ============================================================================
version: 1.3.4
cache: true

# ============================================================================
# MCP SETTINGS — Allowlist de domínios para MCP adicionados via UI
# IPs privados (192.168.x.x) são bloqueados por padrão (SSRF protection)
# ============================================================================
mcpSettings:
  allowedDomains:
    - "192.168.68.115"
    - "*.partiuexecutivo.com.br"
    - "openapi_mcp"
    - "localhost"
    - "0.0.0.0"

# ============================================================================
# MCP SERVERS — Configurados no servidor (disponíveis para todos os usuários)
# Mais confiável que adicionar via UI (conecta no startup, não por sessão)
# IMPORTANTE: Remova "actual-budget-mcp" adicionado manualmente na UI do
#             LibreChat para evitar duplicatas.
# ============================================================================
mcpServers:
  actual-budget-mcp:
    type: streamable-http
    url: "http://192.168.68.115:4003/mcp"
    title: "Actual Budget"
    timeout: 30000

# ============================================================================
# ENDPOINTS DE IA
# Groq e DeepSeek usam a chave global definida nas variáveis de ambiente.
# ============================================================================
endpoints:
  custom:

    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default:
          - "llama-3.3-70b-versatile"
          - "llama-3.1-8b-instant"
          - "mixtral-8x7b-32768"
          - "gemma2-9b-it"
        fetch: true
      titleConvo: true
      titleModel: "llama-3.1-8b-instant"
      modelDisplayLabel: "Groq"
      iconURL: "https://console.groq.com/favicon.ico"

    - name: "DeepSeek"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default:
          - "deepseek-chat"
          - "deepseek-reasoner"
        fetch: true
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek"

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4-5"
          - "anthropic/claude-opus-4"
          - "google/gemini-2.0-flash-001"
          - "meta-llama/llama-3.3-70b-instruct"
          - "mistralai/mistral-large"
          - "x-ai/grok-3-mini-beta"
        fetch: true
      titleConvo: true
      titleModel: "google/gemini-2.0-flash-001"
      modelDisplayLabel: "OpenRouter"
      dropParams:
        - "stop"

# ============================================================================
# CONFIGURAÇÕES DE ARQUIVO
# ============================================================================
fileConfig:
  serverFileSizeLimit: 100
