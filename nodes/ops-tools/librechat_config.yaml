# ============================================================================
# CONFIGURAÇÕES DE INTERFACE
# ============================================================================
interface:
  # Idioma padrão da interface
  # language: "ptBR"

  # Ocultar o menu de modelos na interface (forçar modelo específico)
  # modelSelect: false

# ============================================================================
# CONFIGURAÇÕES DE ARQUIVO
# ============================================================================
fileConfig:
  # Tamanho máximo de upload por arquivo (em MB)
  serverFileSizeLimit: 100
  # Tipos de arquivo permitidos para upload
  # endpoints:
  #   default:
  #     fileLimit: 10
  #     totalSizeLimit: 200
