# ============================================================================
# LibreChat — Arquivo de Configuração Principal
# Referência: https://www.librechat.ai/docs/configuration/librechat_yaml
# ============================================================================
# Este arquivo é injetado no container via Docker Swarm Config.
# Para atualizar após o deploy:
#   1. Edite este arquivo
#   2. Portainer → Configs → remova librechat_config → Add config com novo conteúdo
#   3. Portainer → Stacks → Update the stack
# ============================================================================
version: 1.1.6
cache: true

# ============================================================================
# SERVIDORES MCP (Model Context Protocol)
# LibreChat conecta via SSE aos servidores providos por supergateway e swagger_mcp.
# ============================================================================
mcpServers:

  supergateway:
    type: sse
    url: "http://supergateway:8080/sse"
    timeout: 60000
    initTimeout: 15000

  swagger-mcp:
    type: sse
    url: "http://swagger_mcp:8081/sse"
    timeout: 60000
    initTimeout: 15000

# ============================================================================
# ENDPOINTS DE IA
# OpenAI e Anthropic ficam como "user_provided" — cada usuário insere sua
# própria chave na interface se quiser usá-los.
# Groq e DeepSeek usam a chave global definida nas variáveis de ambiente.
# ============================================================================
endpoints:
  custom:

    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default:
          - "llama-3.3-70b-versatile"
          - "llama-3.1-8b-instant"
          - "mixtral-8x7b-32768"
          - "gemma2-9b-it"
        fetch: true
      titleConvo: true
      titleModel: "llama-3.1-8b-instant"
      modelDisplayLabel: "Groq"
      iconURL: "https://console.groq.com/favicon.ico"

    - name: "DeepSeek"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default:
          - "deepseek-chat"
          - "deepseek-reasoner"
        fetch: true
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek"

# ============================================================================
# CONFIGURAÇÕES DE ARQUIVO
# ============================================================================
fileConfig:
  serverFileSizeLimit: 100
