version: "3.7"

# ============================================================================
# STACK: LobeHub (LLM Chat + Busca + Storage S3)
# VERSÃO: 1.0
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
# Uso: docker stack deploy -c lobehub.yaml lobehub --env-file lobehub.env
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  lobehub: &lobehub_image ${LOBE_IMAGE:-lobehub/lobehub:latest}
  postgres: &postgres_image ${POSTGRES_IMAGE:-paradedb/paradedb:latest-pg17}
  redis: &redis_image ${REDIS_IMAGE:-redis:7-alpine}
  rustfs: &rustfs_image ${RUSTFS_IMAGE:-rustfs/rustfs:latest}
  rustfs_mc: &rustfs_mc_image ${RUSTFS_MC_IMAGE:-minio/mc:latest}
  searxng: &searxng_image ${SEARXNG_IMAGE:-searxng/searxng:latest}

services:
  # ==========================================================================
  # POSTGRESQL - Banco de Dados do LobeHub
  # ==========================================================================
  postgresql:
    image: *postgres_image
    networks:
      - lobe_internal

    environment:
      - POSTGRES_DB=${LOBE_DB_NAME:-lobechat}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ:-America/Sao_Paulo}

    volumes:
      - lobe_postgres_data:/var/lib/postgresql/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # REDIS - Cache/Sessões/Fila
  # ==========================================================================
  redis:
    image: *redis_image
    command: redis-server --save 60 1000 --appendonly yes
    networks:
      - lobe_internal

    environment:
      - TZ=${TZ:-America/Sao_Paulo}

    volumes:
      - lobe_redis_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==========================================================================
  # RUSTFS - Storage S3 Compatível
  # ==========================================================================
  rustfs:
    image: *rustfs_image
    networks:
      - lobe_internal

    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"

    environment:
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - TZ=${TZ:-America/Sao_Paulo}

    volumes:
      - lobe_rustfs_data:/data

    command: ["--access-key", "${RUSTFS_ACCESS_KEY}", "--secret-key", "${RUSTFS_SECRET_KEY}", "/data"]

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================================================
  # RUSTFS INIT - Cria bucket automaticamente
  # ==========================================================================
  rustfs_init:
    image: *rustfs_mc_image
    networks:
      - lobe_internal

    entrypoint: ["/bin/sh", "-c"]
    command: >
      set -eu;
      echo "[RustFS Init] aguardando endpoint...";
      until mc alias set rustfs "http://rustfs:9000" "$$RUSTFS_ACCESS_KEY" "$$RUSTFS_SECRET_KEY" >/dev/null 2>&1; do
        sleep 2;
      done;
      mc mb --ignore-existing "rustfs/$$RUSTFS_LOBE_BUCKET";
      mc anonymous set download "rustfs/$$RUSTFS_LOBE_BUCKET" || true;
      echo "[RustFS Init] bucket pronto: $$RUSTFS_LOBE_BUCKET";

    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_LOBE_BUCKET=${RUSTFS_LOBE_BUCKET:-lobe}
      - TZ=${TZ:-America/Sao_Paulo}

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  # ==========================================================================
  # SEARXNG - Meta Search Engine (busca web)
  # ==========================================================================
  searxng:
    image: *searxng_image
    networks:
      - lobe_internal

    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - TZ=${TZ:-America/Sao_Paulo}

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ==========================================================================
  # LOBEHUB - Aplicação principal
  # ==========================================================================
  lobe:
    image: *lobehub_image
    networks:
      - lobe_internal
      - proxy_network

    ports:
      - "${LOBE_PORT:-3210}:3210"

    environment:
      ## ===== URLS =====
      - APP_URL=${APP_URL}
      - INTERNAL_APP_URL=${INTERNAL_APP_URL:-}

      ## ===== SEGREDOS =====
      - KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - JWKS_KEY=${JWKS_KEY:-}
      - QSTASH_TOKEN=${QSTASH_TOKEN:-}
      - QSTASH_URL=${QSTASH_URL:-}

      ## ===== BANCO =====
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgresql:5432/${LOBE_DB_NAME:-lobechat}

      ## ===== S3/RUSTFS =====
      - S3_BUCKET=${RUSTFS_LOBE_BUCKET:-lobe}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://rustfs:9000}
      - S3_ENABLE_PATH_STYLE=1
      - S3_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - S3_ACCESS_KEY_ID=${RUSTFS_ACCESS_KEY}
      - S3_SECRET_ACCESS_KEY=${RUSTFS_SECRET_KEY}
      - S3_SET_ACL=0

      ## ===== REDIS =====
      - REDIS_URL=redis://redis:6379
      - REDIS_PREFIX=${REDIS_PREFIX:-lobechat}
      - REDIS_TLS=0

      ## ===== BUSCA =====
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}

      ## ===== OUTROS =====
      - LLM_VISION_IMAGE_USE_BASE64=1
      - TRUST_PROXY=1
      - TZ=${TZ:-America/Sao_Paulo}

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 8
        window: 10m

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get({host:'127.0.0.1',port:3210,path:'/healthz',timeout:5000},(res)=>process.exit((res.statusCode||500)<500?0:1));req.on('timeout',()=>{req.destroy();process.exit(1)});req.on('error',()=>process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  lobe_postgres_data:
    name: ${STACK_PREFIX:-lobehub}_postgres_data
  lobe_redis_data:
    name: ${STACK_PREFIX:-lobehub}_redis_data
  lobe_rustfs_data:
    name: ${STACK_PREFIX:-lobehub}_rustfs_data

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  lobe_internal:
    driver: overlay
    internal: true
  proxy_network:
    external: true
    name: ${NETWORK_NAME}
