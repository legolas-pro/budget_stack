# ============================================================================
# CONFIGS (Docker Swarm Config — injetados nos containers via Portainer)
# Portainer → Configs → Add config:
#   Nome: librechat_config → conteúdo de librechat_config.yaml
# ============================================================================
configs:
  librechat_config:
    external: true
    name: librechat_config
  # mcpo_config:        # descomentar ao ativar mcpo
  #   external: true
  #   name: mcpo_config

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  mongodb_data:
    external: true
    name: ${STACK_PREFIX:-librechat}_mongodb_data
  meili_data:
    external: true
    name: ${STACK_PREFIX:-librechat}_meili_data
  vectordb_data:
    external: true
    name: ${STACK_PREFIX:-librechat}_vectordb_data
  librechat_images:
    external: true
    name: ${STACK_PREFIX:-librechat}_images
  librechat_uploads:
    external: true
    name: ${STACK_PREFIX:-librechat}_uploads
  librechat_logs:
    external: true
    name: ${STACK_PREFIX:-librechat}_logs

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  # Rede interna: MongoDB, Meilisearch, VectorDB, RAG API, LibreChat API
  librechat_internal:
    driver: overlay
    internal: true

  # Rede MCP interna (desativada — descomentar ao ativar serviços MCP)
  # mcp_internal:
  #   driver: overlay
  #   internal: true

  # Rede compartilhada com Cloudflared (deve existir antes do deploy)
  proxy_network:
    external: true
    name: ${PROXY_NETWORK:-proxy_network}
