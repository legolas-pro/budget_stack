version: "3.7"

# ============================================================================
# STACK: LibreChat — AI Chat Platform com MCP Gateway
# VERSÃO: 1.0 — Cloudflared (sem Traefik / sem Caddy)
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
# Componentes:
#   librechat_api  → Chat UI + backend principal      (host: ${LIBRECHAT_PORT:-4080})
#   mongodb        → Banco de dados principal          (interno)
#   meilisearch    → Busca full-text de mensagens      (interno)
#   vectordb       → PostgreSQL + pgvector para RAG    (interno)
#   rag_api        → Retrieval Augmented Generation    (interno)
#   supergateway   → Bridge stdio MCP → SSE            (host: ${SUPERGATEWAY_PORT:-4001})
#   mcpo           → Proxy MCP → OpenAPI REST + Swagger(host: ${MCPO_PORT:-4002})
#   swagger_mcp    → Bridge OpenAPI spec → MCP via SSE (host: ${SWAGGER_MCP_PORT:-4003})
#   cloudflared    → Túnel HTTPS sem reverse proxy     (sem porta de host)
# ============================================================================
# Pré-requisitos de rede (criar uma única vez):
#   docker network create --driver=overlay --attachable proxy_network
#
# Pré-requisitos de volumes (criar uma única vez):
#   docker volume create librechat_mongodb_data
#   docker volume create librechat_meili_data
#   docker volume create librechat_vectordb_data
#   docker volume create librechat_images
#   docker volume create librechat_uploads
#   docker volume create librechat_logs
#
# Deploy:
#   docker stack deploy -c librechat-stack.yaml librechat \
#     --env-file librechat-stack.env
#
# Cloudflared — configure no painel Zero Trust → Tunnels → Public Hostnames:
#   chat.seu-dominio.com  → http://librechat_api:3080
#   mcpo.seu-dominio.com  → http://mcpo:8000
#   mcp.seu-dominio.com   → http://supergateway:8080
# ============================================================================

# ============================================================================
# IMAGENS (altere versões aqui)
# ============================================================================
x-images:
  librechat:    &librechat_image    ghcr.io/danny-avila/librechat:latest
  mongo:        &mongo_image        mongo:8.0
  meilisearch:  &meili_image        getmeili/meilisearch:v1.12.3
  vectordb:     &vectordb_image     pgvector/pgvector:0.8.0-pg16-trixie
  rag_api:      &rag_image          ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
  supergateway: &supergateway_image ghcr.io/supermemoryai/supergateway:latest
  mcpo:         &mcpo_image         ghcr.io/open-webui/mcpo:main
  cloudflared:  &cloudflared_image  cloudflare/cloudflared:latest

# ============================================================================
# DNS COMUM (reutilizado via YAML anchor)
# ============================================================================
x-dns: &common_dns
  dns:
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1
  dns_search: []

# ============================================================================
# SERVIÇOS
# ============================================================================
services:

  # ==========================================================================
  # MONGODB — Banco de dados principal do LibreChat
  # ==========================================================================
  mongodb:
    image: *mongo_image
    command: mongod --noauth
    networks:
      - librechat_internal
    volumes:
      - mongodb_data:/data/db
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ping:1})' --quiet || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # MEILISEARCH — Motor de busca full-text (indexação de conversas)
  # ==========================================================================
  meilisearch:
    image: *meili_image
    networks:
      - librechat_internal
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==========================================================================
  # VECTORDB — PostgreSQL + pgvector (embeddings para RAG)
  # ==========================================================================
  vectordb:
    image: *vectordb_image
    networks:
      - librechat_internal
    environment:
      - POSTGRES_DB=${VECTORDB_NAME:-librechat_rag}
      - POSTGRES_USER=${VECTORDB_USER:-pguser}
      - POSTGRES_PASSWORD=${VECTORDB_PASSWORD}
    volumes:
      - vectordb_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VECTORDB_USER:-pguser} -d ${VECTORDB_NAME:-librechat_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # RAG API — Retrieval Augmented Generation (documentos + embeddings)
  # ==========================================================================
  rag_api:
    image: *rag_image
    networks:
      - librechat_internal
    environment:
      - DB_HOST=vectordb
      - DB_PORT=5432
      - DB_USER=${VECTORDB_USER:-pguser}
      - DB_PASSWORD=${VECTORDB_PASSWORD}
      - DB_NAME=${VECTORDB_NAME:-librechat_rag}
      - RAG_PORT=8000
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # LIBRECHAT API — Chat UI + Backend principal
  # Cloudflared: https://${LIBRECHAT_HOST} → http://librechat_api:3080
  # Porta host: ${LIBRECHAT_PORT:-4080}
  # ==========================================================================
  librechat_api:
    image: *librechat_image
    networks:
      - librechat_internal   # acesso a mongo, meili, rag
      - mcp_internal          # acesso a supergateway, mcpo, swagger_mcp
      - proxy_network         # acesso do cloudflared
    <<: *common_dns
    ports:
      - "${LIBRECHAT_PORT:-4080}:3080"
    environment:
      ## Servidor
      - PORT=3080
      - HOST=0.0.0.0
      - NODE_ENV=production
      ## Banco de dados
      - MONGO_URI=mongodb://mongodb:27017/${MONGO_DB:-librechat}
      ## Busca
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      ## RAG
      - RAG_PORT=8000
      - RAG_API_URL=http://rag_api:8000
      ## Autenticação
      - ALLOW_EMAIL_LOGIN=${ALLOW_EMAIL_LOGIN:-true}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - ALLOW_SOCIAL_LOGIN=false
      - ALLOW_SOCIAL_REGISTRATION=false
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CREDS_KEY=${CREDS_KEY}
      - CREDS_IV=${CREDS_IV}
      ## Domínio público (via Cloudflared)
      - DOMAIN_CLIENT=https://${LIBRECHAT_HOST}
      - DOMAIN_SERVER=https://${LIBRECHAT_HOST}
      - NO_INDEX=true
      ## APIs de IA
      - OPENAI_API_KEY=${OPENAI_API_KEY:-user_provided}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-user_provided}
    configs:
      - source: librechat_config
        target: /app/librechat.yaml
        mode: 0444
    volumes:
      - librechat_images:/app/client/public/images
      - librechat_uploads:/app/api/data/uploads
      - librechat_logs:/app/api/logs
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3080/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  # ==========================================================================
  # SUPERGATEWAY — Bridge MCP stdio → SSE
  # Converte servidores MCP stdio em endpoint SSE consumível pelo LibreChat
  # LibreChat conecta via SSE:  http://supergateway:8080/sse
  # Porta host: ${SUPERGATEWAY_PORT:-4001}
  #
  # Para trocar o servidor MCP, edite SUPERGATEWAY_MCP_COMMAND no env:
  #   Filesystem:  npx -y @modelcontextprotocol/server-filesystem /data
  #   Fetch:       npx -y @modelcontextprotocol/server-fetch
  #   Everything:  npx -y @modelcontextprotocol/server-everything (demo)
  # ==========================================================================
  supergateway:
    image: *supergateway_image
    networks:
      - mcp_internal
      - proxy_network
    <<: *common_dns
    ports:
      - "${SUPERGATEWAY_PORT:-4001}:8080"
    environment:
      - PORT=8080
    command: >-
      --port 8080
      --stdio "${SUPERGATEWAY_MCP_COMMAND}"
      --cors
      --healthEndpoint /health
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ==========================================================================
  # SWAGGER-MCP — Bridge OpenAPI Spec → MCP via SSE
  # Lê uma spec Swagger/OpenAPI e expõe todos os endpoints como ferramentas MCP
  # Reutiliza supergateway como transporte SSE + @openapi-mcp/server como MCP
  # LibreChat conecta via SSE:  http://swagger_mcp:8081/sse
  # Porta host: ${SWAGGER_MCP_PORT:-4003}
  #
  # Configure SWAGGER_MCP_SPEC_URL no env para apontar para sua API:
  #   Exemplo interno: http://actual:5007/api-docs/swagger.json
  #   Exemplo externo: https://petstore.swagger.io/v2/swagger.json
  # ==========================================================================
  swagger_mcp:
    image: *supergateway_image
    networks:
      - mcp_internal
      - proxy_network
    <<: *common_dns
    ports:
      - "${SWAGGER_MCP_PORT:-4003}:8081"
    command: >-
      --port 8081
      --stdio "npx -y @openapi-mcp/server ${SWAGGER_MCP_SPEC_URL}"
      --cors
      --healthEndpoint /health
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # MCPO — Proxy MCP → OpenAPI REST com Swagger UI integrado
  # Consome servidores MCP (stdio) e os expõe como endpoints REST padrão
  # Ideal para integração com ferramentas externas e testes via Swagger UI
  # Porta host: ${MCPO_PORT:-4002}
  # Swagger UI:  http://host:4002/docs
  # ==========================================================================
  mcpo:
    image: *mcpo_image
    networks:
      - mcp_internal
      - proxy_network
    <<: *common_dns
    ports:
      - "${MCPO_PORT:-4002}:8000"
    command: >-
      --port 8000
      --api-key ${MCPO_API_KEY}
      --config /app/config.json
    configs:
      - source: mcpo_config
        target: /app/config.json
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # CLOUDFLARED — Túnel HTTPS (sem Traefik / sem Caddy)
  # Crie o túnel no painel:  Zero Trust → Networks → Tunnels → Create a tunnel
  # Copie o token e adicione ao env: CLOUDFLARED_TOKEN=eyJ...
  #
  # Configure os Public Hostnames no painel Cloudflare:
  #   chat.dominio.com → http://librechat_api:3080  (LibreChat UI)
  #   mcpo.dominio.com → http://mcpo:8000           (API REST + Swagger)
  #   mcp.dominio.com  → http://supergateway:8080   (SSE MCP endpoint)
  # ==========================================================================
  cloudflared:
    image: *cloudflared_image
    command: tunnel --no-autoupdate run
    networks:
      - proxy_network
    <<: *common_dns
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

# ============================================================================
# CONFIGS (Docker Swarm Config — arquivos injetados nos containers)
#
# Crie as configs ANTES do deploy via Portainer:
#   Portainer → Configs → Add config
#     Nome: librechat_config  → cole o conteúdo de librechat.yaml
#     Nome: mcpo_config       → cole o conteúdo de mcpo-config.json
#
# Para atualizar uma config após o deploy:
#   1. Portainer → Configs → remova a config antiga
#   2. Crie a nova config com o mesmo nome
#   3. Portainer → Stacks → Update the stack
# ============================================================================
configs:
  librechat_config:
    external: true
    name: librechat_config
  mcpo_config:
    external: true
    name: mcpo_config

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  mongodb_data:
    external: true
    name: ${STACK_PREFIX:-librechat}_mongodb_data
  meili_data:
    external: true
    name: ${STACK_PREFIX:-librechat}_meili_data
  vectordb_data:
    external: true
    name: ${STACK_PREFIX:-librechat}_vectordb_data
  librechat_images:
    external: true
    name: ${STACK_PREFIX:-librechat}_images
  librechat_uploads:
    external: true
    name: ${STACK_PREFIX:-librechat}_uploads
  librechat_logs:
    external: true
    name: ${STACK_PREFIX:-librechat}_logs

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  # Rede interna: MongoDB, Meilisearch, VectorDB, RAG API, LibreChat API
  librechat_internal:
    driver: overlay
    internal: true

  # Rede MCP interna: supergateway, mcpo, swagger_mcp, LibreChat API
  mcp_internal:
    driver: overlay
    internal: true

  # Rede compartilhada com Cloudflared (deve existir antes do deploy)
  proxy_network:
    external: true
    name: proxy_network
