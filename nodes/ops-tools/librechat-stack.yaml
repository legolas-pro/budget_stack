version: "3.7"

# ============================================================================
# STACK: LibreChat — AI Chat Platform
# VERSÃO: 1.0 — Cloudflared (sem Traefik / sem Caddy)
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
# Componentes ativos:
#   librechat_api  → Chat UI + backend principal      (host: ${LIBRECHAT_PORT:-4080})
#   mongodb        → Banco de dados principal          (interno)
#   meilisearch    → Busca full-text de mensagens      (interno)
#   vectordb       → PostgreSQL + pgvector para RAG    (interno)
#   rag_api        → Retrieval Augmented Generation    (interno)
#
# Componentes MCP (desativados — descomentar quando quiser ativar):
#   supergateway   → Bridge stdio MCP → SSE            (host: ${SUPERGATEWAY_PORT:-4001})
#   mcpo           → Proxy MCP → OpenAPI REST + Swagger(host: ${MCPO_PORT:-4002})
#   swagger_mcp    → Bridge OpenAPI spec → MCP via SSE (host: ${SWAGGER_MCP_PORT:-4003})
# ============================================================================
# Pré-requisitos de rede (criar uma única vez):
#   docker network create --driver=overlay --attachable proxy_network
#
# Pré-requisitos de volumes (criar uma única vez):
#   docker volume create librechat_mongodb_data
#   docker volume create librechat_meili_data
#   docker volume create librechat_vectordb_data
#   docker volume create librechat_images
#   docker volume create librechat_uploads
#   docker volume create librechat_logs
#
# Cloudflared — configure no painel Zero Trust → Tunnels → Public Hostnames:
#   chat.seu-dominio.com → http://librechat_api:3080
# ============================================================================

# ============================================================================
# IMAGENS (altere versões aqui)
# ============================================================================
x-images:
  librechat:    &librechat_image    ghcr.io/danny-avila/librechat:latest
  mongo:        &mongo_image        mongo:8.0
  meilisearch:  &meili_image        getmeili/meilisearch:v1.12.3
  vectordb:     &vectordb_image     pgvector/pgvector:0.8.0-pg16-trixie
  rag_api:      &rag_image          ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
  # MCP (desativado):
  # supergateway: &supergateway_image node:22-alpine
  # mcpo:         &mcpo_image         ghcr.io/open-webui/mcpo:main

# ============================================================================
# DNS COMUM (reutilizado via YAML anchor)
# ============================================================================
x-dns: &common_dns
  dns:
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1
  dns_search: []

# ============================================================================
# SERVIÇOS
# ============================================================================
services:

  # ==========================================================================
  # MONGODB — Banco de dados principal do LibreChat
  # ==========================================================================
  mongodb:
    image: *mongo_image
    command: mongod --noauth
    networks:
      - librechat_internal
    volumes:
      - mongodb_data:/data/db
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ping:1})' --quiet || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # MEILISEARCH — Motor de busca full-text (indexação de conversas)
  # ==========================================================================
  meilisearch:
    image: *meili_image
    networks:
      - librechat_internal
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.1"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # VECTORDB — PostgreSQL + pgvector (embeddings para RAG)
  # ==========================================================================
  vectordb:
    image: *vectordb_image
    networks:
      - librechat_internal
    environment:
      - POSTGRES_DB=${VECTORDB_NAME:-librechat_rag}
      - POSTGRES_USER=${VECTORDB_USER:-pguser}
      - POSTGRES_PASSWORD=${VECTORDB_PASSWORD}
    volumes:
      - vectordb_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VECTORDB_USER:-pguser} -d ${VECTORDB_NAME:-librechat_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # RAG API — Retrieval Augmented Generation (documentos + embeddings)
  # ==========================================================================
  rag_api:
    image: *rag_image
    networks:
      - librechat_internal
    environment:
      - DB_HOST=vectordb
      - DB_PORT=5432
      - DB_USER=${VECTORDB_USER:-pguser}
      - DB_PASSWORD=${VECTORDB_PASSWORD}
      - DB_NAME=${VECTORDB_NAME:-librechat_rag}
      - RAG_PORT=8000
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # LIBRECHAT API — Chat UI + Backend principal
  # Cloudflared aponta para http://librechat_api:3080 — configure domínios no painel
  # Porta host: ${LIBRECHAT_PORT:-4080}
  # ==========================================================================
  librechat_api:
    image: *librechat_image
    networks:
      - librechat_internal
      - proxy_network
      # - mcp_internal   # descomentar ao ativar os serviços MCP
    <<: *common_dns
    ports:
      - "${LIBRECHAT_PORT:-4080}:3080"
    environment:
      ## Servidor
      - PORT=3080
      - HOST=0.0.0.0
      - NODE_ENV=production
      ## Banco de dados
      - MONGO_URI=mongodb://mongodb:27017/${MONGO_DB:-librechat}
      ## Busca
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      ## RAG
      - RAG_PORT=8000
      - RAG_API_URL=http://rag_api:8000
      ## Autenticação
      - ALLOW_EMAIL_LOGIN=${ALLOW_EMAIL_LOGIN:-true}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - ALLOW_SOCIAL_LOGIN=false
      - ALLOW_SOCIAL_REGISTRATION=false
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CREDS_KEY=${CREDS_KEY}
      - CREDS_IV=${CREDS_IV}
      ## URL base — Cloudflare gerencia os domínios externamente
      - DOMAIN_CLIENT=http://localhost:${LIBRECHAT_PORT:-4080}
      - DOMAIN_SERVER=http://localhost:${LIBRECHAT_PORT:-4080}
      - NO_INDEX=true
      ## APIs de IA
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    configs:
      - source: librechat_config
        target: /app/librechat.yaml
        mode: 0444
    volumes:
      - librechat_images:/app/client/public/images
      - librechat_uploads:/app/api/data/uploads
      - librechat_logs:/app/api/logs
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3080/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  # ==========================================================================
  # MCP — SERVIÇOS DESATIVADOS
