version: "3.7"

# ============================================================================
# STACK: Firefly III - Gerenciador de Finanças Pessoais
# VERSÃO: 1.0
# VPS: fin-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# SERVIÇOS:
#   - Firefly III: Gerenciador de finanças pessoais (PHP/Laravel)
#   - MariaDB: Banco de dados
#   - Cron: Tarefas agendadas
#   - MCP: Integração Model Context Protocol (LamPyrid, streamable HTTP)
#
# DEPLOY:
#   docker stack deploy -c firefly.yaml firefly --env-file firefly.env
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  mariadb: &mariadb_image mariadb:11.4
  firefly: &firefly_image fireflyiii/core:version-6
  alpine: &alpine_image alpine:3.19
  lampyrid: &lampyrid_image ${FIREFLY_MCP_IMAGE:-firefly-mcp:local}

services:
  # ==========================================================================
  # MARIADB - Banco de Dados para Firefly III
  # ==========================================================================
  mariadb:
    image: *mariadb_image
    networks:
      - firefly_internal

    environment:
      - MYSQL_ROOT_PASSWORD=${FIREFLY_MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${FIREFLY_DB_NAME:-firefly}
      - MYSQL_USER=${FIREFLY_DB_USER:-firefly}
      - MYSQL_PASSWORD=${FIREFLY_DB_PASSWORD}

    volumes:
      - firefly_mariadb_data:/var/lib/mysql

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # FIREFLY III - Gerenciador de Finanças Pessoais
  # ==========================================================================
  app:
    image: *firefly_image
    networks:
      - firefly_internal

    ports:
      - "${FIREFLY_PORT:-8080}:8080"

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== BANCO DE DADOS =====
      - DB_CONNECTION=mysql
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=${FIREFLY_DB_NAME:-firefly}
      - DB_USERNAME=${FIREFLY_DB_USER:-firefly}
      - DB_PASSWORD=${FIREFLY_DB_PASSWORD}

      ## ===== APLICAÇÃO =====
      - APP_KEY=${FIREFLY_APP_KEY}
      - APP_URL=http://localhost:${FIREFLY_PORT:-8080}
      - TRUSTED_PROXIES=**
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stack

      ## ===== CRON TOKEN =====
      - STATIC_CRON_TOKEN=${FIREFLY_CRON_TOKEN:-}

      ## ===== LOCALIZAÇÃO =====
      - DEFAULT_LANGUAGE=pt_BR
      - DEFAULT_LOCALE=equal
      - TZ=America/Sao_Paulo

      ## ===== CACHE =====
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file

      ## ===== SMTP (opcional) =====
      - MAIL_MAILER=${FIREFLY_MAIL_MAILER:-log}
      - MAIL_HOST=${FIREFLY_MAIL_HOST:-smtp.google.com}
      - MAIL_PORT=${FIREFLY_MAIL_PORT:-465}
      - MAIL_FROM=${FIREFLY_MAIL_FROM:-firefly@dinamopro.com}
      - MAIL_USERNAME=${FIREFLY_MAIL_USER:-}
      - MAIL_PASSWORD=${FIREFLY_MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${FIREFLY_MAIL_ENCRYPTION:-ssl}

      ## ===== SEGURANÇA =====
      - AUTHENTICATION_GUARD=web
      - AUTHENTICATION_GUARD_HEADER=
      - AUTHENTICATION_GUARD_EMAIL=

    volumes:
      - firefly_upload:/var/www/html/storage/upload

    depends_on:
      - mariadb

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # FIREFLY III CRON - Tarefas Agendadas
  # Documentação: https://docs.firefly-iii.org/how-to/firefly-iii/advanced/cron/
  # ==========================================================================
  cron:
    image: *alpine_image
    networks:
      - firefly_internal

    command: >
      sh -c "
        echo '0 3 * * * wget -qO- http://app:8080/api/v1/cron/${FIREFLY_CRON_TOKEN:-}' | crontab - &&
        crond -f -l 8
      "

    environment:
      - TZ=America/Sao_Paulo

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
        reservations:
          cpus: "0.05"
          memory: 16M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ==========================================================================
  # LAMPYRID MCP - Model Context Protocol para Firefly III (ACESSO INTERNO)
  # https://github.com/RadCod3/LamPyrid
  # ==========================================================================
  mcp:
    image: *lampyrid_image
    networks:
      - firefly_internal

    ports:
      - "${FIREFLY_MCP_PORT:-3002}:3000"

    environment:
      - FIREFLY_BASE_URL=http://app:8080
      - FIREFLY_TOKEN=${FIREFLY_API_TOKEN}
      # Supergateway -> LamPyrid (stdio) -> HTTP streamable
      - MCP_TRANSPORT=stdio
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3000
      - FIREFLY_MCP_OUTPUT_TRANSPORT=${FIREFLY_MCP_OUTPUT_TRANSPORT:-streamableHttp}
      - FIREFLY_MCP_HTTP_PATH=${FIREFLY_MCP_HTTP_PATH:-/mcp}
      - FIREFLY_MCP_HEALTH_ENDPOINT=${FIREFLY_MCP_HEALTH_ENDPOINT:-/health}
      - FIREFLY_MCP_STDIO_CMD=${FIREFLY_MCP_STDIO_CMD:-lampyrid}
      - LOGGING_LEVEL=${FIREFLY_MCP_LOG_LEVEL:-INFO}
      # OAuth opcional para acesso remoto seguro via Claude Connector
      - GOOGLE_CLIENT_ID=${FIREFLY_MCP_GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${FIREFLY_MCP_GOOGLE_CLIENT_SECRET:-}
      - SERVER_BASE_URL=${FIREFLY_MCP_PUBLIC_URL:-}
      # Persistência opcional de sessões/tokens OAuth entre reinícios
      - JWT_SIGNING_KEY=${FIREFLY_MCP_JWT_SIGNING_KEY:-}
      - OAUTH_STORAGE_ENCRYPTION_KEY=${FIREFLY_MCP_OAUTH_STORAGE_ENCRYPTION_KEY:-}
      - OAUTH_STORAGE_PATH=/app/data/oauth
      - TZ=America/Sao_Paulo

    volumes:
      - firefly_mcp_oauth_data:/app/data/oauth

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: any

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  firefly_mariadb_data:
    driver: local
  firefly_upload:
    driver: local
  firefly_mcp_oauth_data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  firefly_internal:
    driver: overlay
    internal: true
