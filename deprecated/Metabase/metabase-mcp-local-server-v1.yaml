version: "3.8"

services:
  metabase_mcp:
    image: mcp/metabase:latest
    hostname: metabase-mcp-local
    restart: unless-stopped
    environment:
      - METABASE_URL=${METABASE_URL:?set METABASE_URL}
      - METABASE_USERNAME=${METABASE_USERNAME:?set METABASE_USERNAME}
      - METABASE_API_KEY=${METABASE_API_KEY:?set METABASE_API_KEY}
      - METABASE_PASSWORD=${METABASE_PASSWORD:?set METABASE_PASSWORD}
      - MCP_MODE=http
      - USE_FIXED_HTTP=true
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=info
      - AUTH_TOKEN=${MCP_AUTH_TOKEN:?set MCP_AUTH_TOKEN}
      - TRUST_PROXY=1
      - CORS_ORIGIN=*
    ports:
      - "3333:3333"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  default:
    name: metabase-mcp-local-net
