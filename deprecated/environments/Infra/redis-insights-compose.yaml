version: "3.8"

# ============================================================================
# COMPOSE: Redis Insights - Interface Web
# VPS: Infra
# AUTOR: Legolas @ Dinamo Pro
#
# DEPLOY (Docker Compose):
#   cd /opt/redis-insights
#   docker compose -f redis-insights-compose.yml up -d
# ============================================================================

volumes:
  redis_insights_data:
    driver: local

services:

  # ==========================================================================
  # REDIS INSIGHTS - Interface Web
  # ==========================================================================
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    volumes:
      - redis_insights_data:/data
    ports:
      - "5540:5540"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5540/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
