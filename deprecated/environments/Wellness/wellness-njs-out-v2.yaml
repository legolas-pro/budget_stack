version: "3.7"

services:
  # =============================================================================
  # N8N EDITOR - Interface Principal
  # =============================================================================
  n8n_editor:
    image: n8nio/n8n:latest
    command: start
    networks:
      - wellness-network
    
    # Configuração DNS para resolver requisições externas
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []
    
    environment:
      ## ===== BANCO DE DADOS =====
      - N8N_FIX_MIGRATIONS=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-wellness_n8n}
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      
      ## ===== CRIPTOGRAFIA =====
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      
      ## ===== URLs E ACESSO =====
      - N8N_HOST=${N8N_HOST:-wellness-njs.dinamopro.ai}
      - N8N_EDITOR_BASE_URL=https://${N8N_HOST:-wellness-njs.dinamopro.ai}/
      - WEBHOOK_URL=https://${WEBHOOK_HOST:-wellness-wh.dinamopro.ai}/
      - N8N_PROTOCOL=https
      - N8N_ONBOARDING_FLOW_DISABLED=true
      
      ## ===== EXECUÇÃO =====
      - NODE_ENV=production
      - EXECUTIONS_MODE=queue
      - EXECUTIONS_TIMEOUT=3600
      - EXECUTIONS_TIMEOUT_MAX=7200
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=internal
      - N8N_RUNNERS_MAX_CONCURRENCY=5
      
      ## ===== PACOTES COMUNITÁRIOS =====
      - N8N_REINSTALL_MISSING_PACKAGES=true
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_NODE_PATH=/home/node/.n8n/nodes
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      
      ## ===== SMTP =====
      - N8N_SMTP_SENDER=${SMTP_SENDER:-bot@dinamopro.online}
      - N8N_SMTP_USER=${SMTP_USER:-bot@dinamopro.online}
      - N8N_SMTP_PASS=${SMTP_PASSWORD}
      - N8N_SMTP_HOST=${SMTP_HOST:-smtp.hostinger.com}
      - N8N_SMTP_PORT=${SMTP_PORT:-465}
      - N8N_SMTP_SSL=false
      
      ## ===== REDIS/QUEUE =====
      - QUEUE_BULL_REDIS_HOST=n8n_redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=3
      
      ## ===== MÉTRICAS =====
      - N8N_METRICS=true
      
      ## ===== LIMPEZA DE DADOS =====
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336
      
      ## ===== IA/OPENAI =====
      - N8N_AI_ENABLED=true
      - N8N_AI_PROVIDER=openai
      - N8N_AI_OPENAI_API_KEY=${OPENAI_API_KEY}
      
      ## ===== PERMISSÕES =====
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=moment,lodash
      
      ## ===== LOCALIZAÇÃO =====
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_DEFAULT_LOCALE=pt-BR
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          cpus: "0.5"
          memory: 768M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.http.routers.wellness_editor.rule=Host(`${N8N_HOST:-wellness-njs.dinamopro.ai}`)
        - traefik.http.routers.wellness_editor.entrypoints=websecure
        - traefik.http.routers.wellness_editor.priority=2
        - traefik.http.routers.wellness_editor.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wellness_editor.service=wellness_editor
        - traefik.http.services.wellness_editor.loadbalancer.server.port=5678
        - traefik.http.services.wellness_editor.loadbalancer.passhostheader=true
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # N8N WEBHOOK - Processamento de Webhooks
  # =============================================================================
  n8n_webhook:
    image: n8nio/n8n:latest
    command: webhook
    networks:
      - wellness-network
    
    # Configuração DNS para resolver requisições externas
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []
    
    environment:
      ## ===== BANCO DE DADOS =====
      - N8N_FIX_MIGRATIONS=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-wellness_n8n}
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      
      ## ===== CRIPTOGRAFIA =====
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      
      ## ===== URLs E ACESSO =====
      - N8N_HOST=${N8N_HOST:-wellness-njs.dinamopro.ai}
      - N8N_EDITOR_BASE_URL=https://${N8N_HOST:-wellness-njs.dinamopro.ai}/
      - WEBHOOK_URL=https://${WEBHOOK_HOST:-wellness-wh.dinamopro.ai}/
      - N8N_PROTOCOL=https
      - N8N_ONBOARDING_FLOW_DISABLED=true
      
      ## ===== EXECUÇÃO =====
      - NODE_ENV=production
      - EXECUTIONS_MODE=queue
      - EXECUTIONS_TIMEOUT=3600
      - EXECUTIONS_TIMEOUT_MAX=7200
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=internal
      
      ## ===== PACOTES COMUNITÁRIOS =====
      - N8N_REINSTALL_MISSING_PACKAGES=true
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_NODE_PATH=/home/node/.n8n/nodes
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      
      ## ===== SMTP =====
      - N8N_SMTP_SENDER=${SMTP_SENDER:-bot@dinamopro.online}
      - N8N_SMTP_USER=${SMTP_USER:-bot@dinamopro.online}
      - N8N_SMTP_PASS=${SMTP_PASSWORD}
      - N8N_SMTP_HOST=${SMTP_HOST:-smtp.hostinger.com}
      - N8N_SMTP_PORT=${SMTP_PORT:-465}
      - N8N_SMTP_SSL=false
      
      ## ===== REDIS/QUEUE =====
      - QUEUE_BULL_REDIS_HOST=n8n_redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=3
      
      ## ===== MÉTRICAS =====
      - N8N_METRICS=true
      
      ## ===== LIMPEZA DE DADOS =====
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336
      
      ## ===== IA/OPENAI =====
      - N8N_AI_ENABLED=true
      - N8N_AI_PROVIDER=openai
      - N8N_AI_OPENAI_API_KEY=${OPENAI_API_KEY}
      
      ## ===== PERMISSÕES =====
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=moment,lodash
      
      ## ===== LOCALIZAÇÃO =====
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_DEFAULT_LOCALE=pt-BR
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          cpus: "0.5"
          memory: 768M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.http.routers.wellness_webhook.rule=Host(`${WEBHOOK_HOST:-wellness-wh.dinamopro.ai}`)
        - traefik.http.routers.wellness_webhook.entrypoints=websecure
        - traefik.http.routers.wellness_webhook.priority=2
        - traefik.http.routers.wellness_webhook.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wellness_webhook.service=wellness_webhook
        - traefik.http.services.wellness_webhook.loadbalancer.server.port=5678
        - traefik.http.services.wellness_webhook.loadbalancer.passhostheader=true
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # N8N WORKER - Processamento de Filas
  # =============================================================================
  n8n_worker:
    image: n8nio/n8n:latest
    command: worker --concurrency=10
    networks:
      - wellness-network
    
    # Configuração DNS para resolver requisições externas
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []
    
    environment:
      ## ===== BANCO DE DADOS =====
      - N8N_FIX_MIGRATIONS=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-wellness_n8n}
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      
      ## ===== CRIPTOGRAFIA =====
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      
      ## ===== URLs E ACESSO =====
      - N8N_HOST=${N8N_HOST:-wellness-njs.dinamopro.ai}
      - N8N_EDITOR_BASE_URL=https://${N8N_HOST:-wellness-njs.dinamopro.ai}/
      - WEBHOOK_URL=https://${WEBHOOK_HOST:-wellness-wh.dinamopro.ai}/
      - N8N_PROTOCOL=https
      - N8N_ONBOARDING_FLOW_DISABLED=true
      
      ## ===== EXECUÇÃO =====
      - NODE_ENV=production
      - EXECUTIONS_MODE=queue
      - EXECUTIONS_TIMEOUT=3600
      - EXECUTIONS_TIMEOUT_MAX=7200
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=internal
      
      ## ===== PACOTES COMUNITÁRIOS =====
      - N8N_REINSTALL_MISSING_PACKAGES=true
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_NODE_PATH=/home/node/.n8n/nodes
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      
      ## ===== SMTP =====
      - N8N_SMTP_SENDER=${SMTP_SENDER:-bot@dinamopro.online}
      - N8N_SMTP_USER=${SMTP_USER:-bot@dinamopro.online}
      - N8N_SMTP_PASS=${SMTP_PASSWORD}
      - N8N_SMTP_HOST=${SMTP_HOST:-smtp.hostinger.com}
      - N8N_SMTP_PORT=${SMTP_PORT:-465}
      - N8N_SMTP_SSL=false
      
      ## ===== REDIS/QUEUE =====
      - QUEUE_BULL_REDIS_HOST=n8n_redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=3
      
      ## ===== MÉTRICAS =====
      - N8N_METRICS=true
      
      ## ===== LIMPEZA DE DADOS =====
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336
      
      ## ===== IA/OPENAI =====
      - N8N_AI_ENABLED=true
      - N8N_AI_PROVIDER=openai
      - N8N_AI_OPENAI_API_KEY=${OPENAI_API_KEY}
      
      ## ===== PERMISSÕES =====
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=moment,lodash
      
      ## ===== LOCALIZAÇÃO =====
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_DEFAULT_LOCALE=pt-BR
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 1024M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # REDIS - Sistema de Filas
  # =============================================================================
  n8n_redis:
    image: redis:7-alpine
    command: 
      - redis-server
      - --appendonly yes
      - --port 6379
      - --maxmemory 1536mb
      - --maxmemory-policy allkeys-lru
      - --save 900 1
      - --save 300 10
      - --save 60 10000
    networks:
      - wellness-network
    
    # Configuração DNS
    dns:
      - 8.8.8.8
      - 1.1.1.1
    
    volumes:
      - redis_data:/data
    
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =============================================================================
  # MCP SERVER - Model Context Protocol
  # =============================================================================
  n8n_mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    networks:
      - wellness-network
    
    # Configuração DNS para resolver requisições externas
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []
    
    environment:
      ## ===== SERVIDOR MCP =====
      - MCP_MODE=http
      - USE_FIXED_HTTP=true
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=info
      
      ## ===== AUTENTICAÇÃO =====
      - AUTH_TOKEN=${MCP_AUTH_TOKEN:-wellness-internal-2025}
      
      ## ===== INTEGRAÇÃO N8N =====
      - N8N_API_URL=http://n8n_editor:5678
      - N8N_API_KEY=${N8N_API_KEY}
      
      ## ===== TELEMETRIA =====
      - N8N_MCP_TELEMETRY_DISABLED=true
      
      ## ===== SEGURANÇA =====
      - WEBHOOK_SECURITY_MODE=moderate
      
      ## ===== REDE =====
      - TRUST_PROXY=1
      - CORS_ORIGIN=*
    
    depends_on:
      - n8n_editor
      - n8n_redis
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.http.routers.wellness_mcp.rule=Host(`${MCP_HOST:-wellness-njs-mcp.dinamopro.ai}`)
        - traefik.http.routers.wellness_mcp.entrypoints=websecure
        - traefik.http.routers.wellness_mcp.priority=1
        - traefik.http.routers.wellness_mcp.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wellness_mcp.service=wellness_mcp_service
        - traefik.http.services.wellness_mcp_service.loadbalancer.server.port=3333
        - traefik.http.services.wellness_mcp_service.loadbalancer.passhostheader=true
        - traefik.http.routers.wellness_mcp_path.rule=PathPrefix(`/mcp`)
        - traefik.http.routers.wellness_mcp_path.entrypoints=websecure
        - traefik.http.routers.wellness_mcp_path.priority=1
        - traefik.http.routers.wellness_mcp_path.service=wellness_mcp_service
    
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis_data:
    external: true
    name: redis_data
  postgres_data:
    external: true
    name: postgres_data
  volume_swarm_certificates:
    external: true
    name: volume_swarm_certificates

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  wellness-network:
    external: true
    name: wellness-network
