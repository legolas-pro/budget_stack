version: "3.8"

services:
  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing-din-tools
    hostname: syncthing-hub
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - STGUIADDRESS=0.0.0.0:8384
      - STHOMEDIR=/var/syncthing
      - STNODEFAULTFOLDER=true
    volumes:
      - /opt/syncthing/config:/var/syncthing/config
      - /opt/syncthing/data:/var/syncthing/data
    ports:
      # Portas de sincronização - acesso direto via sync.dinamopro.com
      - target: 22000
        published: 22000
        protocol: tcp
        mode: host
      - target: 22000
        published: 22000
        protocol: udp
        mode: host
      # Discovery local (opcional, mas recomendado)
      - target: 21027
        published: 21027
        protocol: udp
        mode: host
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        # Traefik - WebUI
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"

        # Router para WebUI (via Cloudflare Proxy)
        - "traefik.http.routers.syncthing.rule=Host(`syncthing.dinamopro.com`)"
        - "traefik.http.routers.syncthing.entrypoints=websecure"
        - "traefik.http.routers.syncthing.tls=true"
        - "traefik.http.routers.syncthing.tls.certresolver=letsencrypt"
        - "traefik.http.services.syncthing.loadbalancer.server.port=8384"

        # Headers para Cloudflare (garante que Syncthing veja o IP real)
        - "traefik.http.middlewares.syncthing-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
        - "traefik.http.middlewares.syncthing-headers.headers.customRequestHeaders.X-Real-IP="
        - "traefik.http.middlewares.syncthing-headers.headers.customRequestHeaders.X-Forwarded-For="
        - "traefik.http.middlewares.syncthing-headers.headers.sslRedirect=true"

        # Security Headers
        - "traefik.http.middlewares.syncthing-security.headers.frameDeny=true"
        - "traefik.http.middlewares.syncthing-security.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.syncthing-security.headers.browserXssFilter=true"
        - "traefik.http.middlewares.syncthing-security.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.syncthing-security.headers.stsIncludeSubdomains=true"

        # Chain de middlewares
        - "traefik.http.routers.syncthing.middlewares=syncthing-headers,syncthing-security"

      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

networks:
  traefik_public:
    external: true

# ============================================================================
# CONFIGURAÇÃO DNS NO CLOUDFLARE:
# ============================================================================
#
# 1. syncthing.dinamopro.com (WebUI - Interface de gerenciamento)
#    Tipo: A
#    Nome: syncthing
#    Conteúdo: [IP do seu VPS]
#    Proxy: ✅ ATIVADO (nuvem laranja)
#    TTL: Auto
#
# 2. sync.dinamopro.com (Protocolo de Sync - Conexão direta)
#    Tipo: A
#    Nome: sync
#    Conteúdo: [IP do seu VPS]
#    Proxy: ❌ DESATIVADO (nuvem cinza - DNS only)
#    TTL: Auto
#
# ============================================================================
# CONFIGURAÇÃO NOS DISPOSITIVOS CLIENTES:
# ============================================================================
#
# Android/Desktop:
# - Não precisa configurar nada especial
# - O Syncthing vai usar automaticamente sync.dinamopro.com:22000
# - Ou conectar diretamente pelo IP:22000
#
# Adicione o Device ID do servidor nos dispositivos remotos
#
# ============================================================================
# DEPLOY:
# ============================================================================
#
# 1. Criar diretórios:
#    sudo mkdir -p /opt/syncthing/{config,data}
#    sudo chown -R 1000:1000 /opt/syncthing
#
# 2. Deploy da stack:
#    docker stack deploy -c syncthing.yaml syncthing
#
# 3. Verificar logs:
#    docker service logs syncthing_syncthing -f
#
# 4. Acessar WebUI:
#    https://syncthing.dinamopro.com
#
# ============================================================================