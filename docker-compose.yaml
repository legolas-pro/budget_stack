version: "3.7"

# ============================================================================
# STACK: Actual Budget - Orçamento Pessoal
# VERSÃO: 1.4
# ============================================================================
#
# SERVIÇOS ATIVOS:
#   - app         → Actual Budget UI (Node.js/SQLite)       host: ${ACTUAL_PORT:-5006}
#   - api         → REST API (jhonderson/actual-http-api)   host: ${ACTUAL_API_PORT:-5007}
#   - actual_ai   -> Classificação com LLM / automações      sem porta pública
#   - actual_bi_postgres -> Banco relacional BI              host: ${ACTUAL_BI_POSTGRES_PORT:-55432}
#   - actual_bi_sync     -> Upsert API -> Postgres           interval: ${ACTUAL_BI_SYNC_INTERVAL_SECONDS:-300}s
#   - actual_mcp         -> Model Context Protocol (SSE)     host: ${ACTUAL_MCP_PORT:-3001}
#   - pluggy_mcp         -> MCP Open Finance                 host: ${PLUGGY_MCP_PORT:-3002}
#
# DEPLOY:
#   docker stack deploy -c docker-compose.yaml ${STACK_PREFIX:-actual_budget} --env-file actual.env
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  actual: &actual_image actualbudget/actual-server:latest
  actual_http_api: &actual_http_api_image jhonderson/actual-http-api:latest
  actual_ai: &actual_ai_image ${ACTUAL_AI_IMAGE:-docker.io/sakowicz/actual-ai:latest}
  actual_bi_postgres: &actual_bi_postgres_image ${ACTUAL_BI_POSTGRES_IMAGE:-postgres:16-alpine}
  actual_bi_sync: &actual_bi_sync_image ghcr.io/legolas-pro/actual-bi-sync:latest
  actual_mcp: &actual_mcp_image ${ACTUAL_MCP_IMAGE:-sstefanov/actual-mcp:latest}
  pluggy_mcp: &pluggy_mcp_image ghcr.io/legolas-pro/pluggy-mcp:latest

services:
  # ==========================================================================
  # ACTUAL BUDGET - Orçamento Pessoal (Local-First)
  # ==========================================================================
  app:
    image: *actual_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_PORT:-5006}:5006"

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - actual_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "node", "src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
      
  api:
    image: *actual_http_api_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_API_PORT:-5007}:5007"

    environment:
      - ACTUAL_SERVER_URL=http://app:5006
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_PASSWORD}
      - API_KEY=${ACTUAL_API_KEY}
      - TZ=America/Sao_Paulo

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      disable: true

  # ==========================================================================
  # ACTUAL AI - Classificação automática com LLM
  # https://github.com/sakowicz/actual-ai
  # ==========================================================================
  actual_ai:
    image: *actual_ai_image
    networks:
      - actual_internal
      - actual_egress

    environment:
      ACTUAL_SERVER_URL: http://app:5006
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_SYNC_ID}
      # Fixed classification scope: write enabled, no bank sync before classify.
      FEATURES: '["classifyOnStartup","rerunMissedTransactions","freeWebSearch"]'
      CLASSIFICATION_SCHEDULE_CRON: ${ACTUAL_AI_CLASSIFICATION_SCHEDULE_CRON:-0 */6 * * *}
      TZ: ${TZ:-America/Sao_Paulo}

      # Provedor
      LLM_PROVIDER: ${ACTUAL_AI_LLM_PROVIDER:-openai}

      # OpenAI / OpenAI-compatible
      OPENAI_API_KEY: ${ACTUAL_AI_OPENAI_API_KEY:-}
      OPENAI_MODEL: ${ACTUAL_AI_OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${ACTUAL_AI_OPENAI_BASE_URL:-}

      # Anthropic
      ANTHROPIC_API_KEY: ${ACTUAL_AI_ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ACTUAL_AI_ANTHROPIC_MODEL:-}
      ANTHROPIC_BASE_URL: ${ACTUAL_AI_ANTHROPIC_BASE_URL:-}

      # Groq
      GROQ_API_KEY: ${ACTUAL_AI_GROQ_API_KEY:-}
      GROQ_MODEL: ${ACTUAL_AI_GROQ_MODEL:-}
      GROQ_BASE_URL: ${ACTUAL_AI_GROQ_BASE_URL:-}

      # OpenRouter
      OPENROUTER_API_KEY: ${ACTUAL_AI_OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${ACTUAL_AI_OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${ACTUAL_AI_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_REFERRER: ${ACTUAL_AI_OPENROUTER_REFERRER:-}
      OPENROUTER_TITLE: ${ACTUAL_AI_OPENROUTER_TITLE:-actual-ai}
      OPENROUTER_ENABLE_TOOL_CALLING: ${ACTUAL_AI_OPENROUTER_ENABLE_TOOL_CALLING:-false}

      # Google Gemini
      GOOGLE_GENERATIVE_AI_API_KEY: ${ACTUAL_AI_GOOGLE_GENERATIVE_AI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_MODEL: ${ACTUAL_AI_GOOGLE_GENERATIVE_AI_MODEL:-}
      GOOGLE_GENERATIVE_AI_BASE_URL: ${ACTUAL_AI_GOOGLE_GENERATIVE_AI_BASE_URL:-}

      # Ollama
      OLLAMA_MODEL: ${ACTUAL_AI_OLLAMA_MODEL:-}
      OLLAMA_BASE_URL: ${ACTUAL_AI_OLLAMA_BASE_URL:-}

      # Recursos opcionais
      VALUESERP_API_KEY: ${ACTUAL_AI_VALUESERP_API_KEY:-}
      ACTUAL_E2E_PASSWORD: ${ACTUAL_AI_ACTUAL_E2E_PASSWORD:-}
      NODE_TLS_REJECT_UNAUTHORIZED: ${ACTUAL_AI_NODE_TLS_REJECT_UNAUTHORIZED:-}
      NOT_GUESSED_TAG: ${ACTUAL_AI_NOT_GUESSED_TAG:-#sardinha-revisar}
      GUESSED_TAG: ${ACTUAL_AI_GUESSED_TAG:-#sardinha-ai}
      REQUESTS_PER_MINUTE: ${ACTUAL_AI_REQUESTS_PER_MINUTE:-}
      TOKENS_PER_MINUTE: ${ACTUAL_AI_TOKENS_PER_MINUTE:-}
      PROMPT_TEMPLATE: |-
        Você é o classificador Sardinha do Actual Budget.
        Sua função aqui não é conversar com humanos. Sua função é apenas escolher a categoria existente mais adequada para a transação ou deixar a transação sem classificação quando a confiança for insuficiente.

        Regras inegociáveis:
        - Seja conservador. É melhor não classificar do que classificar errado.
        - Pense em português, mas use exatamente os nomes e IDs das categorias cadastradas no orçamento.
        - Priorize consistência e repetibilidade. Se o mesmo comerciante normalmente cairia na mesma categoria, preserve isso.
        - Dê peso alto para importedPayee e payee. Use description/notas apenas como apoio.
        - Se a transação parecer ambígua, excepcional, parcelada, ajuste interno, transferência, pagamento de cartão, tarifa, estorno ou reembolso, exija confiança alta antes de classificar.
        - Se houver dúvida material entre categorias parecidas, especialmente entre Necessidades, Conforto, Metas, Prazeres ou equivalentes do orçamento, prefira não classificar.
        - Não invente contexto que não esteja nos dados ou na busca web.
        - Use resultado de busca web apenas como apoio para identificar o comerciante; nunca trate a busca como verdade absoluta.
        - Não proponha novas categorias, a menos que esse recurso esteja explicitamente habilitado fora deste prompt e seja realmente necessário.
        - Quando classificar, escolha apenas uma categoria existente da lista abaixo.

        Categorias disponíveis:
        {{ "{{" }}#each categoryGroups}}
        - Grupo: {{ "{{" }}name}} (id: {{ "{{" }}id}})
        {{ "{{" }}#each categories}}
          - Categoria: {{ "{{" }}name}} (id: {{ "{{" }}id}})
        {{ "{{" }}/each}}
        {{ "{{" }}/each}}

        Dados da transação:
        - Tipo: {{ "{{" }}type}}
        - Valor absoluto: {{ "{{" }}amount}}
        - Data: {{ "{{" }}date}}
        - Cleared: {{ "{{" }}cleared}}
        - Reconciled: {{ "{{" }}reconciled}}
        {{ "{{" }}#if payee}}- Payee: {{ "{{" }}payee}}
        {{ "{{" }}/if}}{{ "{{" }}#if importedPayee}}- Imported Payee: {{ "{{" }}importedPayee}}
        {{ "{{" }}/if}}{{ "{{" }}#if description}}- Descrição/Notas: {{ "{{" }}description}}
        {{ "{{" }}/if}}

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  # ==========================================================================
  # ACTUAL BI POSTGRES - Banco relacional para BI e conexao direta
  # ==========================================================================
  actual_bi_postgres:
    image: *actual_bi_postgres_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_BI_POSTGRES_PORT:-55432}:5432"

    environment:
      - POSTGRES_DB=${ACTUAL_BI_DB_NAME:-actual_bi}
      - POSTGRES_USER=${ACTUAL_BI_DB_USER:-actual_bi}
      - POSTGRES_PASSWORD=${ACTUAL_BI_DB_PASSWORD}
      - TZ=America/Sao_Paulo

    volumes:
      - actual_bi_postgres_data:/var/lib/postgresql/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACTUAL_BI_DB_USER:-actual_bi} -d ${ACTUAL_BI_DB_NAME:-actual_bi}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # ACTUAL BI SYNC - Worker conservador (Actual API -> PostgreSQL)
  # ==========================================================================
  actual_bi_sync:
    image: *actual_bi_sync_image
    networks:
      - actual_internal

    environment:
      # Origem: API do proprio serviço Actual nesta stack
      - ACTUAL_HTTP_API_BASE_URL=${ACTUAL_HTTP_API_BASE_URL:-http://api:5007/v1}
      - ACTUAL_HTTP_API_KEY=${ACTUAL_API_KEY}
      - ACTUAL_HTTP_TIMEOUT_SECONDS=${ACTUAL_HTTP_TIMEOUT_SECONDS:-30}
      - ACTUAL_HTTP_VERIFY_SSL=${ACTUAL_HTTP_VERIFY_SSL:-true}
      - ACTUAL_HTTP_RETRIES=${ACTUAL_HTTP_RETRIES:-3}
      - ACTUAL_HTTP_BACKOFF_SECONDS=${ACTUAL_HTTP_BACKOFF_SECONDS:-2}

      # Escopo de ingestao
      - ACTUAL_BI_ENDPOINTS=${ACTUAL_BI_ENDPOINTS:-accounts,transactions,payees,categories,categorygroups,schedules}
      - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}
      - ACTUAL_BI_TRANSACTIONS_SINCE_DATE=${ACTUAL_BI_TRANSACTIONS_SINCE_DATE:-2000-01-01}
      - ACTUAL_BI_TRANSACTIONS_UNTIL_DATE=${ACTUAL_BI_TRANSACTIONS_UNTIL_DATE:-}
      - ACTUAL_BI_REQUIRE_NON_EMPTY_BUDGETS=${ACTUAL_BI_REQUIRE_NON_EMPTY_BUDGETS:-true}
      - ACTUAL_BI_FAIL_ON_ENDPOINT_ERROR=${ACTUAL_BI_FAIL_ON_ENDPOINT_ERROR:-true}

      # Destino: PostgreSQL
      - DB_HOST=${STACK_PREFIX:-actual_budget}_actual_bi_postgres
      - DB_PORT=5432
      - DB_NAME=${ACTUAL_BI_DB_NAME:-actual_bi}
      - DB_USER=${ACTUAL_BI_DB_USER:-actual_bi}
      - DB_PASSWORD=${ACTUAL_BI_DB_PASSWORD}
      - DB_SSLMODE=${ACTUAL_BI_DB_SSLMODE:-disable}
      - DB_CONNECT_TIMEOUT_SECONDS=${ACTUAL_BI_DB_CONNECT_TIMEOUT_SECONDS:-10}

      # Usuario read-only para conexao direta (opcional)
      - READONLY_DB_USER=${ACTUAL_BI_READONLY_DB_USER:-}
      - READONLY_DB_PASSWORD=${ACTUAL_BI_READONLY_DB_PASSWORD:-}

      # Worker
      - SYNC_INTERVAL_SECONDS=${ACTUAL_BI_SYNC_INTERVAL_SECONDS:-300}
      - RUN_ONCE=${ACTUAL_BI_SYNC_RUN_ONCE:-false}
      - LOG_LEVEL=${ACTUAL_BI_SYNC_LOG_LEVEL:-INFO}
      - HEALTH_SUCCESS_FILE=/tmp/actual_bi_sync_last_success
      - HEALTH_ERROR_FILE=/tmp/actual_bi_sync_last_error
      - TZ=America/Sao_Paulo

    depends_on:
      - api
      - actual_bi_postgres

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/actual_bi_sync_last_success"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ==========================================================================
  # ACTUAL MCP - Model Context Protocol Server (SSE)
  # ==========================================================================
  actual_mcp:
    image: ${ACTUAL_MCP_IMAGE:-sstefanov/actual-mcp:latest}
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_MCP_PORT:-3001}:3000"

    environment:
      - ACTUAL_SERVER_URL=http://app:5006
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}
      - BEARER_TOKEN=${ACTUAL_API_KEY}
      - TZ=America/Sao_Paulo

    command: ["--sse", "--enable-write", "--enable-bearer", "--port", "3000"]

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ==========================================================================
  # PLUGGY MCP - Integração Model Context Protocol com Open Finance
  # ==========================================================================
  pluggy-mcp:
    # Atenção: docker stack deploy ignora `build`, a imagem deve ser construída antes
    # ou use docker-compose para ambiente de dev.
    image: *pluggy_mcp_image
    ports:
      # Host 3002 -> container 3000 (a imagem expõe SSE em /sse na porta 3000)
      - "${PLUGGY_MCP_PORT:-3002}:3000"
    networks:
      - actual_internal

    environment:
      # A imagem gerada espera API_KEY_DEFAULT para aplicar o header X-API-KEY.
      - API_KEY_DEFAULT=${PLUGGY_API_KEY}
      # Opcional: mantidas para referencia operacional / geracao manual de nova API key.
      # Obtenha em: https://dashboard.pluggy.ai > Aplicações
      - PLUGGY_CLIENT_ID=${PLUGGY_CLIENT_ID}
      - PLUGGY_CLIENT_SECRET=${PLUGGY_CLIENT_SECRET}
      - TZ=${TZ:-America/Sao_Paulo}

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  actual_data:
    driver: local
  actual_bi_postgres_data:
    name: ${ACTUAL_BI_POSTGRES_DATA_VOLUME_NAME:-actual_bi_postgres_data}

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  actual_internal:
    driver: overlay
    internal: true
  actual_egress:
    driver: overlay
