version: "3.7"

# ============================================================================
# STACK: Actual Budget - Orçamento Pessoal
# VERSÃO: 1.4
# ============================================================================
#
# SERVIÇOS ATIVOS:
#   - app         → Actual Budget UI (Node.js/SQLite)       host: ${ACTUAL_PORT:-5006}
#   - api         → REST API (jhonderson/actual-http-api)   host: ${ACTUAL_API_PORT:-5007}
#   - actual_ai   -> Classificação com LLM / automações      sem porta pública
#   - actual_bi_postgres -> Banco relacional BI              host: ${ACTUAL_BI_POSTGRES_PORT:-55432}
#   - actual_bi_sync     -> Upsert API -> Postgres           interval: ${ACTUAL_BI_SYNC_INTERVAL_SECONDS:-300}s
#
# DEPLOY:
#   docker stack deploy -c docker-compose.yaml ${STACK_PREFIX:-actual_budget} --env-file actual.env
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  actual: &actual_image actualbudget/actual-server:latest
  actual_http_api: &actual_http_api_image jhonderson/actual-http-api:latest
  actual_ai: &actual_ai_image ${ACTUAL_AI_IMAGE:-docker.io/sakowicz/actual-ai:latest}
  actual_bi_postgres: &actual_bi_postgres_image ${ACTUAL_BI_POSTGRES_IMAGE:-postgres:16-alpine}
  actual_bi_sync: &actual_bi_sync_image ghcr.io/legolas-pro/actual-bi-sync:latest

services:
  # ==========================================================================
  # ACTUAL BUDGET - Orçamento Pessoal (Local-First)
  # ==========================================================================
  app:
    image: *actual_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_PORT:-5006}:5006"

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - actual_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "node", "src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
      
  api:
    image: *actual_http_api_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_API_PORT:-5007}:5007"

    environment:
      - ACTUAL_SERVER_URL=http://app:5006
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_PASSWORD}
      - API_KEY=${ACTUAL_API_KEY}
      - TZ=America/Sao_Paulo

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      disable: true

  # ==========================================================================
  # ACTUAL AI - Classificação automática com LLM
  # https://github.com/sakowicz/actual-ai
  # ==========================================================================
  actual_ai:
    image: *actual_ai_image
    networks:
      - actual_internal
      - actual_egress

    environment:
      ACTUAL_SERVER_URL: http://app:5006
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_SYNC_ID}
      # Fixed classification scope: write enabled, no bank sync before classify.
      FEATURES: '["classifyOnStartup","rerunMissedTransactions","freeWebSearch"]'
      CLASSIFICATION_SCHEDULE_CRON: ${ACTUAL_AI_CLASSIFICATION_SCHEDULE_CRON:-0 */6 * * *}
      TZ: ${TZ:-America/Sao_Paulo}

      # Provedor
      LLM_PROVIDER: ${ACTUAL_AI_LLM_PROVIDER:-openai}

      # OpenAI / OpenAI-compatible
      OPENAI_API_KEY: ${ACTUAL_AI_OPENAI_API_KEY:-}
      OPENAI_MODEL: ${ACTUAL_AI_OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${ACTUAL_AI_OPENAI_BASE_URL:-}

      # Anthropic
      ANTHROPIC_API_KEY: ${ACTUAL_AI_ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ACTUAL_AI_ANTHROPIC_MODEL:-}
      ANTHROPIC_BASE_URL: ${ACTUAL_AI_ANTHROPIC_BASE_URL:-}

      # Groq
      GROQ_API_KEY: ${ACTUAL_AI_GROQ_API_KEY:-}
      GROQ_MODEL: ${ACTUAL_AI_GROQ_MODEL:-}
      GROQ_BASE_URL: ${ACTUAL_AI_GROQ_BASE_URL:-}

      # OpenRouter
      OPENROUTER_API_KEY: ${ACTUAL_AI_OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${ACTUAL_AI_OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${ACTUAL_AI_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_REFERRER: ${ACTUAL_AI_OPENROUTER_REFERRER:-}
      OPENROUTER_TITLE: ${ACTUAL_AI_OPENROUTER_TITLE:-actual-ai}
      OPENROUTER_ENABLE_TOOL_CALLING: ${ACTUAL_AI_OPENROUTER_ENABLE_TOOL_CALLING:-false}

      # Google Gemini
      GOOGLE_GENERATIVE_AI_API_KEY: ${ACTUAL_AI_GOOGLE_GENERATIVE_AI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_MODEL: ${ACTUAL_AI_GOOGLE_GENERATIVE_AI_MODEL:-}
      GOOGLE_GENERATIVE_AI_BASE_URL: ${ACTUAL_AI_GOOGLE_GENERATIVE_AI_BASE_URL:-}

      # Ollama
      OLLAMA_MODEL: ${ACTUAL_AI_OLLAMA_MODEL:-}
      OLLAMA_BASE_URL: ${ACTUAL_AI_OLLAMA_BASE_URL:-}

      # Recursos opcionais
      VALUESERP_API_KEY: ${ACTUAL_AI_VALUESERP_API_KEY:-}
      ACTUAL_E2E_PASSWORD: ${ACTUAL_AI_ACTUAL_E2E_PASSWORD:-}
      NODE_TLS_REJECT_UNAUTHORIZED: ${ACTUAL_AI_NODE_TLS_REJECT_UNAUTHORIZED:-}
      NOT_GUESSED_TAG: ${ACTUAL_AI_NOT_GUESSED_TAG:-#sardinha-revisar}
      GUESSED_TAG: ${ACTUAL_AI_GUESSED_TAG:-#sardinha-ai}
      REQUESTS_PER_MINUTE: ${ACTUAL_AI_REQUESTS_PER_MINUTE:-}
      TOKENS_PER_MINUTE: ${ACTUAL_AI_TOKENS_PER_MINUTE:-}
      PROMPT_TEMPLATE: |-
        Categorize the following bank transaction. Be conservative: it is better NOT to categorize than to categorize incorrectly.

        Rules:
        - Give high weight to payee and importedPayee; use description/notes as supporting context only.
        - Prioritize consistency: if the same payee was categorized before, maintain that category.
        - If the transaction is an installment (parcelada), ambiguous, a transfer, credit card payment, fee, chargeback, or refund, require HIGH confidence before classifying.
        - If there is material doubt between similar categories, do NOT classify.
        - Do not suggest new categories.

        Transaction details:
        * Amount: {{ "{{" }}amount}}
        * Type: {{ "{{" }}type}}
        {{ "{{" }}#if description}}* Description: {{ "{{" }}description}}{{ "{{" }}/if}}
        {{ "{{" }}#if payee}}* Payee: {{ "{{" }}payee}}{{ "{{" }}^}}* Payee: {{ "{{" }}importedPayee}}{{ "{{" }}/if}}
        {{ "{{" }}#if date}}* Date: {{ "{{" }}date}}{{ "{{" }}/if}}

        Existing categories by group:
        {{ "{{" }}#each categoryGroups}}
        GROUP: {{ "{{" }}name}} (ID: "{{ "{{" }}id}}")
        {{ "{{" }}#each categories}}
        * {{ "{{" }}name}} (ID: "{{ "{{" }}id}}")
        {{ "{{" }}/each}}
        {{ "{{" }}/each}}

        IMPORTANT: Respond with ONLY a valid JSON object. No text before or after. No markdown. No explanations outside the JSON.

        To classify:      {"type": "existing", "categoryId": "exact-uuid"}
        To skip:          {"type": "rule", "ruleName": "leave uncategorized"}

        Examples:
        {"type": "existing", "categoryId": "abc123"}
        {"type": "rule", "ruleName": "leave uncategorized"}

        {{ "{{" }}#if hasWebSearchTool}}You can use the web search tool to find more information about the transaction.{{ "{{" }}/if}}

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  # ==========================================================================
  # ACTUAL BI POSTGRES - Banco relacional para BI e conexao direta
  # ==========================================================================
  actual_bi_postgres:
    image: *actual_bi_postgres_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_BI_POSTGRES_PORT:-55432}:5432"

    environment:
      - POSTGRES_DB=${ACTUAL_BI_DB_NAME:-actual_bi}
      - POSTGRES_USER=${ACTUAL_BI_DB_USER:-actual_bi}
      - POSTGRES_PASSWORD=${ACTUAL_BI_DB_PASSWORD}
      - TZ=America/Sao_Paulo

    volumes:
      - actual_bi_postgres_data:/var/lib/postgresql/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACTUAL_BI_DB_USER:-actual_bi} -d ${ACTUAL_BI_DB_NAME:-actual_bi}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # ACTUAL BI SYNC - Worker conservador (Actual API -> PostgreSQL)
  # ==========================================================================
  actual_bi_sync:
    image: *actual_bi_sync_image
    networks:
      - actual_internal

    environment:
      # Origem: API do proprio serviço Actual nesta stack
      - ACTUAL_HTTP_API_BASE_URL=${ACTUAL_HTTP_API_BASE_URL:-http://api:5007/v1}
      - ACTUAL_HTTP_API_KEY=${ACTUAL_API_KEY}
      - ACTUAL_HTTP_TIMEOUT_SECONDS=${ACTUAL_HTTP_TIMEOUT_SECONDS:-30}
      - ACTUAL_HTTP_VERIFY_SSL=${ACTUAL_HTTP_VERIFY_SSL:-true}
      - ACTUAL_HTTP_RETRIES=${ACTUAL_HTTP_RETRIES:-3}
      - ACTUAL_HTTP_BACKOFF_SECONDS=${ACTUAL_HTTP_BACKOFF_SECONDS:-2}

      # Escopo de ingestao
      - ACTUAL_BI_ENDPOINTS=${ACTUAL_BI_ENDPOINTS:-accounts,transactions,payees,categories,categorygroups,schedules}
      - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}
      - ACTUAL_BI_TRANSACTIONS_SINCE_DATE=${ACTUAL_BI_TRANSACTIONS_SINCE_DATE:-2000-01-01}
      - ACTUAL_BI_TRANSACTIONS_UNTIL_DATE=${ACTUAL_BI_TRANSACTIONS_UNTIL_DATE:-}
      - ACTUAL_BI_REQUIRE_NON_EMPTY_BUDGETS=${ACTUAL_BI_REQUIRE_NON_EMPTY_BUDGETS:-true}
      - ACTUAL_BI_FAIL_ON_ENDPOINT_ERROR=${ACTUAL_BI_FAIL_ON_ENDPOINT_ERROR:-true}

      # Destino: PostgreSQL
      - DB_HOST=${STACK_PREFIX:-actual_budget}_actual_bi_postgres
      - DB_PORT=5432
      - DB_NAME=${ACTUAL_BI_DB_NAME:-actual_bi}
      - DB_USER=${ACTUAL_BI_DB_USER:-actual_bi}
      - DB_PASSWORD=${ACTUAL_BI_DB_PASSWORD}
      - DB_SSLMODE=${ACTUAL_BI_DB_SSLMODE:-disable}
      - DB_CONNECT_TIMEOUT_SECONDS=${ACTUAL_BI_DB_CONNECT_TIMEOUT_SECONDS:-10}

      # Usuario read-only para conexao direta (opcional)
      - READONLY_DB_USER=${ACTUAL_BI_READONLY_DB_USER:-}
      - READONLY_DB_PASSWORD=${ACTUAL_BI_READONLY_DB_PASSWORD:-}

      # Worker
      - SYNC_INTERVAL_SECONDS=${ACTUAL_BI_SYNC_INTERVAL_SECONDS:-300}
      - RUN_ONCE=${ACTUAL_BI_SYNC_RUN_ONCE:-false}
      - LOG_LEVEL=${ACTUAL_BI_SYNC_LOG_LEVEL:-INFO}
      - HEALTH_SUCCESS_FILE=/tmp/actual_bi_sync_last_success
      - HEALTH_ERROR_FILE=/tmp/actual_bi_sync_last_error
      - TZ=America/Sao_Paulo

    depends_on:
      - api
      - actual_bi_postgres

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/actual_bi_sync_last_success"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10m

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  actual_data:
    driver: local
  actual_bi_postgres_data:
    name: ${ACTUAL_BI_POSTGRES_DATA_VOLUME_NAME:-actual_bi_postgres_data}

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  actual_internal:
    driver: overlay
    internal: true
  actual_egress:
    driver: overlay
