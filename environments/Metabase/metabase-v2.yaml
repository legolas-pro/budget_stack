version: "3.7"

services:
  traefik:
    image: traefik:v3.0
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
      - --accesslog=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencryptresolver.acme.httpchallenge=true
      - --certificatesresolvers.letsencryptresolver.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencryptresolver.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencryptresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - target: 80
        published: 80
      - target: 443
        published: 443
      - target: 8080
        published: 8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    networks:
      - proxy

  metabase:
    image: metabase/metabase:latest
    environment:
      - MB_SITE_URL=${MB_SITE_URL:-https://${DOMAIN}}
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.metabase.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.metabase.entrypoints=websecure
      - traefik.http.routers.metabase.tls=true
      - traefik.http.routers.metabase.tls.certresolver=letsencryptresolver
      - traefik.http.services.metabase.loadbalancer.server.port=3000

  metabase_mcp:
    image: mcp/metabase:latest
    environment:
      - METABASE_URL=http://metabase:3000
      - METABASE_USERNAME=${METABASE_USERNAME}
      - METABASE_API_KEY=${METABASE_API_KEY}
      - METABASE_PASSWORD=${METABASE_PASSWORD}
      - MCP_MODE=http
      - USE_FIXED_HTTP=true
      - HOST=0.0.0.0
      - PORT=3333
      - LOG_LEVEL=info
      - AUTH_TOKEN=${MCP_AUTH_TOKEN:-metabase-internal-2025}
      - TRUST_PROXY=1
      - CORS_ORIGIN=*
    networks:
      - proxy
      - internal
    depends_on:
      - metabase
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.metabase_mcp.rule=Host(`${DOMAIN}`) && PathPrefix(`/mcp`)
      - traefik.http.routers.metabase_mcp.entrypoints=websecure
      - traefik.http.routers.metabase_mcp.priority=100
      - traefik.http.routers.metabase_mcp.tls=true
      - traefik.http.routers.metabase_mcp.tls.certresolver=letsencryptresolver
      - traefik.http.routers.metabase_mcp.service=metabase_mcp_service
      - traefik.http.services.metabase_mcp_service.loadbalancer.server.port=3333

volumes:
  traefik-certificates:
    driver: local
  metabase-data:
    driver: local

networks:
  proxy:
    driver: bridge
  internal:
    driver: bridge
    internal: true
