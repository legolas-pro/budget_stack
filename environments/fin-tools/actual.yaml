version: "3.7"

# ============================================================================
# STACK: Actual Budget - Orçamento Pessoal
# VERSÃO: 1.0
# VPS: fin-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# SERVIÇOS ATIVOS:
#   - Actual Budget: Orçamento pessoal local-first (Node.js/SQLite)
#   - Actual HTTP API: REST API para integração com N8N
#
# SERVIÇOS COMENTADOS:
#   - Actual MCP: Incompatível com API atual do Actual Budget
#
# DEPLOY:
#   docker stack deploy -c actual.yaml actual
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  actual: &actual_image actualbudget/actual-server:latest
  # actual_mcp: &actual_mcp_image sstefanov/actual-mcp:latest  # INCOMPATÍVEL com API atual
  actual_http_api: &actual_http_api_image jhonderson/actual-http-api:latest

services:
  # ==========================================================================
  # ACTUAL BUDGET - Orçamento Pessoal (Local-First)
  # ==========================================================================
  app:
    image: *actual_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_PORT:-5006}:5006"

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - actual_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "node", "src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==========================================================================
  # ACTUAL MCP - COMENTADO (incompatível com API atual do Actual)
  # https://github.com/s-stefanov/actual-mcp
  # ==========================================================================
  # mcp:
  #   image: *actual_mcp_image
  #   command: ["--sse", "--enable-write"]
  #   networks:
  #     - actual_internal
  #   ports:
  #     - "${ACTUAL_MCP_PORT:-3001}:3000"
  #   environment:
  #     - ACTUAL_SERVER_URL=http://app:5006
  #     - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
  #     - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID:-}
  #     - ACTUAL_BUDGET_ENCRYPTION_PASSWORD=${ACTUAL_BUDGET_ENCRYPTION_PASSWORD:-}
  #     - TZ=America/Sao_Paulo
  #   volumes:
  #     - actual_mcp_data:/data
  #   depends_on:
  #     - app
  #   deploy:
  #     mode: replicated
  #     replicas: 1
  #     placement:
  #       constraints:
  #         - node.role == manager
  #     resources:
  #       limits:
  #         cpus: "0.5"
  #         memory: 512M
  #       reservations:
  #         cpus: "0.1"
  #         memory: 128M
  #     restart_policy:
  #       condition: on-failure
  #       delay: 10s
  #       max_attempts: 5
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/sse || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     start_period: 60s
  #     retries: 5

  # ==========================================================================
  # ACTUAL HTTP API - REST API para integração com N8N
  # https://github.com/jhonderson/actual-http-api
  # ==========================================================================
  api:
    image: *actual_http_api_image
    networks:
      - actual_internal

    ports:
      - "${ACTUAL_API_PORT:-5007}:5007"

    environment:
      - ACTUAL_SERVER_URL=http://app:5006
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_PASSWORD}
      - TZ=America/Sao_Paulo

    depends_on:
      - app

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5007 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  actual_data:
    driver: local
  # actual_mcp_data:
  #   driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  actual_internal:
    driver: overlay
    internal: true
