version: "3.8"

# ============================================================================
# STACK: EspoCRM Completo (PostgreSQL + App + Daemon + WebSocket)
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================

networks:
  espocrm_internal:
    driver: overlay
    attachable: true
  traefik_public:
    external: true

volumes:
  espocrm_pgdata:
    driver: local
  espocrm_app:
    driver: local

services:

  # ==========================================================================
  # POSTGRESQL - Banco de Dados Local
  # ==========================================================================
  espocrm_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: espocrm
      POSTGRES_USER: espocrm
      POSTGRES_PASSWORD: ${ESPOCRM_DB_PASSWORD}
    volumes:
      - espocrm_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - espocrm_internal
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U espocrm -d espocrm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # ESPOCRM - Aplicação Principal
  # ==========================================================================
  espocrm:
    image: espocrm/espocrm:latest
    environment:
      ESPOCRM_DATABASE_PLATFORM: "Postgresql"
      ESPOCRM_DATABASE_HOST: "espocrm_db"
      ESPOCRM_DATABASE_PORT: "5432"
      ESPOCRM_DATABASE_NAME: "espocrm"
      ESPOCRM_DATABASE_USER: "espocrm"
      ESPOCRM_DATABASE_PASSWORD: "${ESPOCRM_DB_PASSWORD}"
      ESPOCRM_SITE_URL: "https://${ESPOCRM_DOMAIN}"
      ESPOCRM_ADMIN_USERNAME: "${ESPOCRM_ADMIN_USER}"
      ESPOCRM_ADMIN_PASSWORD: "${ESPOCRM_ADMIN_PASSWORD}"
    volumes:
      - espocrm_app:/var/www/html
    networks:
      - espocrm_internal
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.espocrm.rule=Host(`${ESPOCRM_DOMAIN}`)"
        - "traefik.http.routers.espocrm.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.espocrm.entrypoints=websecure"
        - "traefik.http.services.espocrm.loadbalancer.server.port=80"
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      - espocrm_db

  # ==========================================================================
  # ESPOCRM DAEMON - Background Jobs
  # ==========================================================================
  espocrm_daemon:
    image: espocrm/espocrm:latest
    entrypoint: ["docker-daemon.sh"]
    environment:
      ESPOCRM_DATABASE_PLATFORM: "Postgresql"
      ESPOCRM_DATABASE_HOST: "espocrm_db"
      ESPOCRM_DATABASE_PORT: "5432"
      ESPOCRM_DATABASE_NAME: "espocrm"
      ESPOCRM_DATABASE_USER: "espocrm"
      ESPOCRM_DATABASE_PASSWORD: "${ESPOCRM_DB_PASSWORD}"
    volumes:
      - espocrm_app:/var/www/html
    networks:
      - espocrm_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - espocrm_db
      - espocrm

  # ==========================================================================
  # ESPOCRM WEBSOCKET - Real-time Updates
  # ==========================================================================
  espocrm_websocket:
    image: espocrm/espocrm:latest
    entrypoint: ["docker-websocket.sh"]
    environment:
      ESPOCRM_DATABASE_PLATFORM: "Postgresql"
      ESPOCRM_DATABASE_HOST: "espocrm_db"
      ESPOCRM_DATABASE_PORT: "5432"
      ESPOCRM_DATABASE_NAME: "espocrm"
      ESPOCRM_DATABASE_USER: "espocrm"
      ESPOCRM_DATABASE_PASSWORD: "${ESPOCRM_DB_PASSWORD}"
    volumes:
      - espocrm_app:/var/www/html
    networks:
      - espocrm_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - espocrm_db
      - espocrm