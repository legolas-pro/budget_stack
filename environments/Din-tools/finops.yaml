  #     - "3000"
  #   networks:
  #     - finops_internal
  #
  #   ports:
  #     - "${HABITICA_MCP_PORT:-3002}:3000"
  #
  #   environment:
  #     - HABITICA_USER_ID=${HABITICA_USER_ID:-}
  #     - HABITICA_API_TOKEN=${HABITICA_API_TOKEN:-}
  #     - MCP_LANG=pt-BR
  #     - TZ=America/Sao_Paulo
  #
  #   deploy:
  #     mode: replicated
  #     replicas: 1
  #     placement:
  #       constraints:
  #         - node.role == manager
  #     resources:
  #       limits:
  #         cpus: "0.5"
  #         memory: 256M
  #       reservations:
  #         cpus: "0.1"
  #         memory: 128M
  #     restart_policy:
  #       condition: on-failure
  #       delay: 5s
  #       max_attempts: 3
  #
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  finops_mariadb_data:
    driver: local
  finops_mongodb_data:
    driver: local
  finops_mongodb_config:
    driver: local
  finops_firefly_upload:
    driver: local
  finops_actual_data:
    driver: local
  # finops_actual_mcp_data:
  #   driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  finops_internal:
    driver: overlay
    internal: true
  traefik_public:
    external: true
    name: traefik_public
