version: "3.7"

# ============================================================================
# STACK: FinOps (Financial Operations)
# VERSÃO: 1.3 - Firefly III + Habitica + Actual Budget + MCPs
# VPS: Din-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# SERVIÇOS:
#   - Firefly III: Gerenciador de finanças pessoais (PHP/Laravel)
#   - Habitica: Gamificação de hábitos e tarefas (awinterstein fork)
#   - Actual Budget: Orçamento pessoal local-first (Node.js/SQLite)
#   - Actual MCP: Model Context Protocol para Actual Budget
#   - Habitica MCP: Model Context Protocol para Habitica (via supergateway)
#
# INTEGRAÇÃO:
#   - Cada serviço usa seu próprio banco de dados (isolamento)
#   - Integração entre serviços via APIs REST usando N8N
#   - MCPs expostos em portas locais para acesso interno do N8N
#
# DEPLOY:
#   docker stack deploy -c finops.yaml finops
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  mariadb: &mariadb_image mariadb:11
  mongodb: &mongodb_image mongo:7
  firefly: &firefly_image fireflyiii/core:latest
  alpine: &alpine_image alpine:3.19
  habitica_server: &habitica_server_image awinterstein/habitica-server:latest
  habitica_client: &habitica_client_image awinterstein/habitica-client:latest
  actual: &actual_image actualbudget/actual-server:latest
  actual_mcp: &actual_mcp_image sstefanov/actual-mcp:latest
  supergateway: &supergateway_image supercorp/supergateway:latest

services:
  # ==========================================================================
  # MARIADB - Banco de Dados para Firefly III
  # ==========================================================================
  finops_mariadb:
    image: *mariadb_image
    networks:
      - finops_internal

    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${FIREFLY_DB_NAME:-firefly}
      - MYSQL_USER=${FIREFLY_DB_USER:-firefly}
      - MYSQL_PASSWORD=${FIREFLY_DB_PASSWORD}

    volumes:
      - finops_mariadb_data:/var/lib/mysql

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # MONGODB - Banco de Dados para Habitica (Replica Set para Change Streams)
  # ==========================================================================
  finops_mongodb:
    image: *mongodb_image
    networks:
      - finops_internal

    # Replica Set necessário para Habitica (usa Change Streams)
    command: ["--replSet", "rs0", "--bind_ip_all"]

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${HABITICA_DB_NAME:-habitica}

    volumes:
      - finops_mongodb_data:/data/db
      - finops_mongodb_config:/data/configdb

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # MONGODB INIT - Inicializa o Replica Set (executa uma vez)
  # ==========================================================================
  finops_mongodb_init:
    image: *mongodb_image
    networks:
      - finops_internal

    command: >
      bash -c "
        sleep 10 &&
        mongosh --host finops_mongodb -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval '
          rs.status().ok || rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"finops_mongodb:27017\"}]})
        ' &&
        echo 'Replica Set initialized' &&
        sleep infinity
      "

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}

    depends_on:
      - finops_mongodb

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  # ==========================================================================
  # FIREFLY III - Gerenciador de Finanças Pessoais
  # ==========================================================================
  firefly:
    image: *firefly_image
    networks:
      - finops_internal
      - traefik_public

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== BANCO DE DADOS =====
      - DB_CONNECTION=mysql
      - DB_HOST=finops_mariadb
      - DB_PORT=3306
      - DB_DATABASE=${FIREFLY_DB_NAME:-firefly}
      - DB_USERNAME=${FIREFLY_DB_USER:-firefly}
      - DB_PASSWORD=${FIREFLY_DB_PASSWORD}

      ## ===== APLICAÇÃO =====
      - APP_KEY=${FIREFLY_APP_KEY}
      - APP_URL=https://${FIREFLY_HOST:-firefly.dinamopro.com}
      - TRUSTED_PROXIES=**
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stack

      ## ===== CRON TOKEN =====
      - STATIC_CRON_TOKEN=${FIREFLY_CRON_TOKEN:-}

      ## ===== LOCALIZAÇÃO =====
      - DEFAULT_LANGUAGE=pt_BR
      - DEFAULT_LOCALE=equal
      - TZ=America/Sao_Paulo

      ## ===== CACHE =====
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file

      ## ===== SMTP (opcional) =====
      - MAIL_MAILER=${FIREFLY_MAIL_MAILER:-log}
      - MAIL_HOST=${FIREFLY_MAIL_HOST:-smtp.google.com}
      - MAIL_PORT=${FIREFLY_MAIL_PORT:-465}
      - MAIL_FROM=${FIREFLY_MAIL_FROM:-firefly@dinamopro.com}
      - MAIL_USERNAME=${FIREFLY_MAIL_USER:-}
      - MAIL_PASSWORD=${FIREFLY_MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${FIREFLY_MAIL_ENCRYPTION:-ssl}

      ## ===== SEGURANÇA =====
      - AUTHENTICATION_GUARD=web
      - AUTHENTICATION_GUARD_HEADER=
      - AUTHENTICATION_GUARD_EMAIL=

    volumes:
      - finops_firefly_upload:/var/www/html/storage/upload

    depends_on:
      - finops_mariadb

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.finops_firefly.rule=Host(`${FIREFLY_HOST:-firefly.dinamopro.com}`)
        - traefik.http.routers.finops_firefly.entrypoints=websecure
        - traefik.http.routers.finops_firefly.tls.certresolver=letsencryptresolver
        - traefik.http.routers.finops_firefly.service=finops_firefly
        - traefik.http.services.finops_firefly.loadbalancer.server.port=8080
        - traefik.http.services.finops_firefly.loadbalancer.passhostheader=true

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # FIREFLY III CRON - Tarefas Agendadas (Alpine com wget)
  # Documentação: https://docs.firefly-iii.org/how-to/firefly-iii/advanced/cron/
  # ==========================================================================
  firefly_cron:
    image: *alpine_image
    networks:
      - finops_internal

    command: >
      sh -c "
        echo '0 3 * * * wget -qO- http://firefly:8080/api/v1/cron/${FIREFLY_CRON_TOKEN:-}' | crontab - &&
        crond -f -l 8
      "

    environment:
      - TZ=America/Sao_Paulo

    depends_on:
      - firefly

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
        reservations:
          cpus: "0.05"
          memory: 16M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ==========================================================================
  # HABITICA SERVER - Backend (awinterstein fork)
  # https://hub.docker.com/r/awinterstein/habitica-server
  # ==========================================================================
  habitica_server:
    image: *habitica_server_image
    networks:
      - finops_internal

    environment:
      ## ===== BANCO DE DADOS =====
      - NODE_ENV=production
      - NODE_DB_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@finops_mongodb:27017/${HABITICA_DB_NAME:-habitica}?authSource=admin

      ## ===== APLICAÇÃO =====
      - BASE_URL=https://${HABITICA_HOST:-habitica.dinamopro.com}
      - ADMIN_EMAIL=${HABITICA_ADMIN_EMAIL:-admin@dinamopro.com}

      ## ===== SESSÃO =====
      - SESSION_SECRET=${HABITICA_SESSION_SECRET}

      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    depends_on:
      - finops_mongodb

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v3/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ==========================================================================
  # HABITICA CLIENT - Frontend (awinterstein fork)
  # https://hub.docker.com/r/awinterstein/habitica-client
  # ==========================================================================
  habitica_client:
    image: *habitica_client_image
    networks:
      - finops_internal
      - traefik_public

    environment:
      ## ===== BACKEND =====
      - HABITICA_SERVER=http://habitica_server:3000

      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    depends_on:
      - habitica_server

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.finops_habitica.rule=Host(`${HABITICA_HOST:-habitica.dinamopro.com}`)
        - traefik.http.routers.finops_habitica.entrypoints=websecure
        - traefik.http.routers.finops_habitica.tls.certresolver=letsencryptresolver
        - traefik.http.routers.finops_habitica.service=finops_habitica
        - traefik.http.services.finops_habitica.loadbalancer.server.port=8080
        - traefik.http.services.finops_habitica.loadbalancer.passhostheader=true

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # ACTUAL BUDGET - Orçamento Pessoal (Local-First)
  # ==========================================================================
  actual:
    image: *actual_image
    networks:
      - finops_internal
      - traefik_public

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - finops_actual_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.finops_actual.rule=Host(`${ACTUAL_HOST:-actual.dinamopro.com}`)
        - traefik.http.routers.finops_actual.entrypoints=websecure
        - traefik.http.routers.finops_actual.tls.certresolver=letsencryptresolver
        - traefik.http.routers.finops_actual.service=finops_actual
        - traefik.http.services.finops_actual.loadbalancer.server.port=5006
        - traefik.http.services.finops_actual.loadbalancer.passhostheader=true

    healthcheck:
      test: ["CMD", "node", "src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==========================================================================
  # ACTUAL MCP - Model Context Protocol para N8N (ACESSO INTERNO)
  # https://github.com/s-stefanov/actual-mcp
  # ==========================================================================
  actual_mcp:
    image: *actual_mcp_image
    command: ["--sse", "--enable-write"]
    networks:
      - finops_internal

    # Porta exposta apenas no host local (sem acesso externo)
    ports:
      - "${ACTUAL_MCP_PORT:-3001}:3000"

    environment:
      ## ===== CONEXÃO COM ACTUAL BUDGET =====
      - ACTUAL_SERVER_URL=http://actual:5006
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID:-}
      - ACTUAL_BUDGET_ENCRYPTION_PASSWORD=${ACTUAL_BUDGET_ENCRYPTION_PASSWORD:-}

      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - finops_actual_mcp_data:/data

    depends_on:
      - actual

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # HABITICA MCP - Model Context Protocol para Habitica (ACESSO INTERNO)
  # https://github.com/iBreaker/habitica-mcp-server
  # Usa supergateway para converter stdio → SSE
  #
  # NOTA: Desativado (replicas: 0) - URL hardcoded para habitica.com
  #       Para usar com self-hosted, criar fork com HABITICA_API_URL configurável
  #       Para ativar: altere replicas para 1
  # ==========================================================================
  habitica_mcp:
    image: *supergateway_image
    command:
      - --stdio
      - npx -y habitica-mcp-server
      - --port
      - "3000"
    networks:
      - finops_internal

    # Porta exposta apenas no host local (sem acesso externo)
    ports:
      - "${HABITICA_MCP_PORT:-3002}:3000"

    environment:
      ## ===== CREDENCIAIS HABITICA =====
      ## Para habitica.com: obter em https://habitica.com/user/settings/api
      ## Para self-hosted: aguardando fork com suporte a URL customizada
      - HABITICA_USER_ID=${HABITICA_USER_ID:-}
      - HABITICA_API_TOKEN=${HABITICA_API_TOKEN:-}

      ## ===== IDIOMA =====
      - MCP_LANG=pt-BR

      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    deploy:
      mode: replicated
      replicas: 0  # DESATIVADO - altere para 1 quando tiver fork com suporte self-hosted
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  finops_mariadb_data:
    driver: local
  finops_mongodb_data:
    driver: local
  finops_firefly_upload:
    driver: local
  finops_actual_data:
    driver: local
  finops_actual_mcp_data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  finops_internal:
    driver: overlay
    internal: true
  traefik_public:
    external: true
    name: traefik_public
