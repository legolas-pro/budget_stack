version: "3.7"

# ============================================================================
# STACK: FinOps - Actual Budget
# VERSÃO: 2.0
# VPS: Din-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# SERVIÇOS ATIVOS:
#   - Actual Budget: Orçamento pessoal local-first (Node.js/SQLite)
#
# SERVIÇOS COMENTADOS (MCPs - descomente para ativar):
#   - Actual MCP: Model Context Protocol para Actual Budget
#
# DEPLOY:
#   docker stack deploy -c finops.yaml fin_ops
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  actual: &actual_image actualbudget/actual-server:latest
  actual_mcp: &actual_mcp_image sstefanov/actual-mcp:latest

services:
  # ==========================================================================
  # ACTUAL BUDGET - Orçamento Pessoal (Local-First)
  # ==========================================================================
  actual:
    image: *actual_image
    networks:
      - finops_internal
      - traefik_public

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - finops_actual_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.finops_actual.rule=Host(`${ACTUAL_HOST:-actual.dinamopro.com}`)
        - traefik.http.routers.finops_actual.entrypoints=websecure
        - traefik.http.routers.finops_actual.tls.certresolver=letsencryptresolver
        - traefik.http.routers.finops_actual.service=finops_actual
        - traefik.http.services.finops_actual.loadbalancer.server.port=5006
        - traefik.http.services.finops_actual.loadbalancer.passhostheader=true

    healthcheck:
      test: ["CMD", "node", "src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==========================================================================
  # ACTUAL MCP - Model Context Protocol para N8N (ACESSO INTERNO)
  # https://github.com/s-stefanov/actual-mcp
  # DESCOMENTE PARA ATIVAR
  # ==========================================================================
  # actual_mcp:
  #   image: *actual_mcp_image
  #   command: ["--sse", "--enable-write"]
  #   networks:
  #     - finops_internal
  #
  #   ports:
  #     - "${ACTUAL_MCP_PORT:-3001}:3000"
  #
  #   environment:
  #     - ACTUAL_SERVER_URL=http://actual:5006
  #     - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
  #     - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID:-}
  #     - ACTUAL_BUDGET_ENCRYPTION_PASSWORD=${ACTUAL_BUDGET_ENCRYPTION_PASSWORD:-}
  #     - TZ=America/Sao_Paulo
  #
  #   volumes:
  #     - finops_actual_mcp_data:/data
  #
  #   depends_on:
  #     - actual
  #
  #   deploy:
  #     mode: replicated
  #     replicas: 1
  #     placement:
  #       constraints:
  #         - node.role == manager
  #     resources:
  #       limits:
  #         cpus: "0.5"
  #         memory: 256M
  #       reservations:
  #         cpus: "0.1"
  #         memory: 128M
  #     restart_policy:
  #       condition: on-failure
  #       delay: 5s
  #       max_attempts: 3
  #
  #   healthcheck:
  #     test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  finops_actual_data:
    driver: local
  # finops_actual_mcp_data:
  #   driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  finops_internal:
    driver: overlay
    internal: true
  traefik_public:
    external: true
    name: traefik_public
