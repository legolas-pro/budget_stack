version: "3.7"

# ============================================================================
# STACK: FinOps (Financial Operations)
# VERSÃO: 1.5 - Firefly III + Actual Budget
# VPS: Din-tools
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================
#
# SERVIÇOS ATIVOS:
#   - Firefly III: Gerenciador de finanças pessoais (PHP/Laravel)
#   - Actual Budget: Orçamento pessoal local-first (Node.js/SQLite)
#
# SERVIÇOS COMENTADOS (MCPs - descomente para ativar):
#   - Actual MCP: Model Context Protocol para Actual Budget
#
# INTEGRAÇÃO:
#   - Cada serviço usa seu próprio banco de dados (isolamento)
#   - Integração entre serviços via APIs REST usando N8N
#
# DEPLOY:
#   docker stack deploy -c finops.yaml fin_ops
#
# ============================================================================

# ============================================================================
# IMAGENS (altere as versões aqui)
# ============================================================================
x-images:
  mariadb: &mariadb_image mariadb:11
  firefly: &firefly_image fireflyiii/core:latest
  alpine: &alpine_image alpine:3.19
  actual: &actual_image actualbudget/actual-server:latest
  actual_mcp: &actual_mcp_image sstefanov/actual-mcp:latest

services:
  # ==========================================================================
  # MARIADB - Banco de Dados para Firefly III
  # ==========================================================================
  finops_mariadb:
    image: *mariadb_image
    networks:
      - finops_internal

    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${FIREFLY_DB_NAME:-firefly}
      - MYSQL_USER=${FIREFLY_DB_USER:-firefly}
      - MYSQL_PASSWORD=${FIREFLY_DB_PASSWORD}

    volumes:
      - finops_mariadb_data:/var/lib/mysql

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # FIREFLY III - Gerenciador de Finanças Pessoais
  # ==========================================================================
  firefly:
    image: *firefly_image
    networks:
      - finops_internal
      - traefik_public

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== BANCO DE DADOS =====
      - DB_CONNECTION=mysql
      - DB_HOST=finops_mariadb
      - DB_PORT=3306
      - DB_DATABASE=${FIREFLY_DB_NAME:-firefly}
      - DB_USERNAME=${FIREFLY_DB_USER:-firefly}
      - DB_PASSWORD=${FIREFLY_DB_PASSWORD}

      ## ===== APLICAÇÃO =====
      - APP_KEY=${FIREFLY_APP_KEY}
      - APP_URL=https://${FIREFLY_HOST:-firefly.dinamopro.com}
      - TRUSTED_PROXIES=**
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stack

      ## ===== CRON TOKEN =====
      - STATIC_CRON_TOKEN=${FIREFLY_CRON_TOKEN:-}

      ## ===== LOCALIZAÇÃO =====
      - DEFAULT_LANGUAGE=pt_BR
      - DEFAULT_LOCALE=equal
      - TZ=America/Sao_Paulo

      ## ===== CACHE =====
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file

      ## ===== SMTP (opcional) =====
      - MAIL_MAILER=${FIREFLY_MAIL_MAILER:-log}
      - MAIL_HOST=${FIREFLY_MAIL_HOST:-smtp.google.com}
      - MAIL_PORT=${FIREFLY_MAIL_PORT:-465}
      - MAIL_FROM=${FIREFLY_MAIL_FROM:-firefly@dinamopro.com}
      - MAIL_USERNAME=${FIREFLY_MAIL_USER:-}
      - MAIL_PASSWORD=${FIREFLY_MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${FIREFLY_MAIL_ENCRYPTION:-ssl}

      ## ===== SEGURANÇA =====
      - AUTHENTICATION_GUARD=web
      - AUTHENTICATION_GUARD_HEADER=
      - AUTHENTICATION_GUARD_EMAIL=

    volumes:
      - finops_firefly_upload:/var/www/html/storage/upload

    depends_on:
      - finops_mariadb

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.finops_firefly.rule=Host(`${FIREFLY_HOST:-firefly.dinamopro.com}`)
        - traefik.http.routers.finops_firefly.entrypoints=websecure
        - traefik.http.routers.finops_firefly.tls.certresolver=letsencryptresolver
        - traefik.http.routers.finops_firefly.service=finops_firefly
        - traefik.http.services.finops_firefly.loadbalancer.server.port=8080
        - traefik.http.services.finops_firefly.loadbalancer.passhostheader=true

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # FIREFLY III CRON - Tarefas Agendadas (Alpine com wget)
  # Documentação: https://docs.firefly-iii.org/how-to/firefly-iii/advanced/cron/
  # ==========================================================================
  firefly_cron:
    image: *alpine_image
    networks:
      - finops_internal

    command: >
      sh -c "
        echo '0 3 * * * wget -qO- http://firefly:8080/api/v1/cron/${FIREFLY_CRON_TOKEN:-}' | crontab - &&
        crond -f -l 8
      "

    environment:
      - TZ=America/Sao_Paulo

    depends_on:
      - firefly

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
        reservations:
          cpus: "0.05"
          memory: 16M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ==========================================================================
  # ACTUAL BUDGET - Orçamento Pessoal (Local-First)
  # ==========================================================================
  actual:
    image: *actual_image
    networks:
      - finops_internal
      - traefik_public

    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search: []

    environment:
      ## ===== LOCALIZAÇÃO =====
      - TZ=America/Sao_Paulo

    volumes:
      - finops_actual_data:/data

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.finops_actual.rule=Host(`${ACTUAL_HOST:-actual.dinamopro.com}`)
        - traefik.http.routers.finops_actual.entrypoints=websecure
        - traefik.http.routers.finops_actual.tls.certresolver=letsencryptresolver
        - traefik.http.routers.finops_actual.service=finops_actual
        - traefik.http.services.finops_actual.loadbalancer.server.port=5006
        - traefik.http.services.finops_actual.loadbalancer.passhostheader=true

    healthcheck:
      test: ["CMD", "node", "src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==========================================================================
  # ACTUAL MCP - Model Context Protocol para N8N (ACESSO INTERNO)
  # https://github.com/s-stefanov/actual-mcp
  # DESCOMENTE PARA ATIVAR
  # ==========================================================================
  # actual_mcp:
  #   image: *actual_mcp_image
  #   command: ["--sse", "--enable-write"]
  #   networks:
  #     - finops_internal
  #
  #   ports:
  #     - "${ACTUAL_MCP_PORT:-3001}:3000"
  #
  #   environment:
  #     - ACTUAL_SERVER_URL=http://actual:5006
  #     - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
  #     - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID:-}
  #     - ACTUAL_BUDGET_ENCRYPTION_PASSWORD=${ACTUAL_BUDGET_ENCRYPTION_PASSWORD:-}
  #     - TZ=America/Sao_Paulo
  #
  #   volumes:
  #     - finops_actual_mcp_data:/data
  #
  #   depends_on:
  #     - actual
  #
  #   deploy:
  #     mode: replicated
  #     replicas: 1
  #     placement:
  #       constraints:
  #         - node.role == manager
  #     resources:
  #       limits:
  #         cpus: "0.5"
  #         memory: 256M
  #       reservations:
  #         cpus: "0.1"
  #         memory: 128M
  #     restart_policy:
  #       condition: on-failure
  #       delay: 5s
  #       max_attempts: 3
  #
  #   healthcheck:
  #     test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  finops_mariadb_data:
    driver: local
  finops_firefly_upload:
    driver: local
  finops_actual_data:
    driver: local
  # finops_actual_mcp_data:
  #   driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  finops_internal:
    driver: overlay
    internal: true
  traefik_public:
    external: true
    name: traefik_public
