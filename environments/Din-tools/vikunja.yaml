version: "3.8"

# ============================================================================
# STACK: Vikunja Completo (PostgreSQL + App)
# AUTOR: Legolas @ Dinamo Pro
# ============================================================================

networks:
  vikunja_internal:
    driver: overlay
    attachable: true
  traefik_public:
    external: true

volumes:
  vikunja_pgdata:
    driver: local
  vikunja_files:
    driver: local

services:

  # ==========================================================================
  # POSTGRESQL - Banco de Dados Local
  # ==========================================================================
  vikunja_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vikunja
      POSTGRES_USER: vikunja
      POSTGRES_PASSWORD: ${VIKUNJA_DB_PASSWORD}
    volumes:
      - vikunja_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - vikunja_internal
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vikunja -d vikunja"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # VIKUNJA - Aplicação Principal
  # ==========================================================================
  vikunja:
    image: vikunja/vikunja:latest
    environment:
      VIKUNJA_DATABASE_TYPE: "postgres"
      VIKUNJA_DATABASE_HOST: "vikunja_db"
      VIKUNJA_DATABASE_PORT: "5432"
      VIKUNJA_DATABASE_DATABASE: "vikunja"
      VIKUNJA_DATABASE_USER: "vikunja"
      VIKUNJA_DATABASE_PASSWORD: "${VIKUNJA_DB_PASSWORD}"
      VIKUNJA_SERVICE_PUBLICURL: "https://${VIKUNJA_DOMAIN}/"
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "${VIKUNJA_ENABLE_REGISTRATION:-false}"
      VIKUNJA_SERVICE_JWTSECRET: "${VIKUNJA_JWT_SECRET}"
      VIKUNJA_SERVICE_TIMEZONE: "America/Sao_Paulo"
      VIKUNJA_MAILER_ENABLED: "false"
    volumes:
      - vikunja_files:/app/vikunja/files
    networks:
      - vikunja_internal
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.vikunja.rule=Host(`${VIKUNJA_DOMAIN}`)"
        - "traefik.http.routers.vikunja.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.vikunja.entrypoints=websecure"
        - "traefik.http.services.vikunja.loadbalancer.server.port=3456"
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - vikunja_db