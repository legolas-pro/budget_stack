name: Build and Publish Pluggy MCP

on:
  push:
    paths:
      - 'nodes/fin-tools/pluggy-openapis3-mcp-build/**'
      - '.github/workflows/build-pluggy-mcp.yml'
    branches:
      - main
      - master
      - develop

env:
  REGISTRY: ghcr.io
  # A imagem será salva como ghcr.io/git-dinamo/pluggy-mcp
  # É obrigatório que nomes de imagens Docker sejam todos em letras minúsculas.
  IMAGE_NAME: git-dinamo/pluggy-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: nodes/fin-tools/pluggy-openapis3-mcp-build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
